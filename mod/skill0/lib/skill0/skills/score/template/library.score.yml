# library.score.yml — library / framework comparison
title: "Library Selection Scoring"
dimensions:
  - name: feature-coverage
    factor: 8
    desc: "Coverage of core project requirements — can it solve the main problems without critical gaps. 9-10: covers all core needs perfectly, no workarounds needed; 7-8: covers core, edges need workarounds; 5-6: mostly covered, a few features missing; 3-4: many gaps requiring alternatives; 1-2: key functionality missing; 0: fundamentally doesn't solve the core problem."
  - name: api-design
    factor: 6
    desc: "API intuitiveness, consistency, and documentation quality. 9-10: elegant consistent API, exemplary docs; 7-8: pleasant to use, complete docs; 5-6: usable, occasional doc gaps; 3-4: awkward or inconsistent API; 1-2: painful API, missing docs; 0: chaotic API, no docs."
  - name: package-size
    factor: 4
    desc: "Bundle size and dependency chain reasonableness. 9-10: lightweight, zero or minimal deps; 7-8: small dependency chain; 5-6: acceptable; 3-4: dependency tree too heavy; 1-2: pulls in massive unnecessary deps; 0: dependency bomb."
  - name: community-activity
    factor: 6
    desc: "GitHub stars, issue response speed, PR merge frequency, community Q&A quality. 9-10: very active, issues resolved quickly; 7-8: active; 5-6: moderately active; 3-4: low activity, long time since last update; 1-2: barely maintained; 0: archived/abandoned."
  - name: stability
    factor: 6
    desc: "Version stability, breaking change frequency, semver adherence. 9-10: stable, strict semver, smooth upgrades; 7-8: mostly stable; 5-6: occasional breaking changes; 3-4: frequent breaking changes; 1-2: chaotic major versions; 0: no compatibility commitment."
  - name: performance
    factor: 4
    desc: "Runtime performance, memory usage, startup time compared to alternatives. 9-10: excellent performance, clearly better than peers; 7-8: good; 5-6: average, no notable issues; 3-4: has performance weaknesses; 1-2: poor performance; 0: unacceptable performance."
