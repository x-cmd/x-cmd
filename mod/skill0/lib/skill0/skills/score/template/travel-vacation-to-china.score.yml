# travel-vacation-to-china.score.yml — China vacation destination selection

# == Notes for Agents ==
# Scenario: a foreign tourist planning a vacation to China. Unique challenges:
# language barrier, visa requirements, massive geography, regional diversity.
#
# Before scoring, ask:
#   - First time or returning? (first-timers want icons; returnees want depth)
#   - Season? (spring/autumn best; summer hot+crowded; winter cold but fewer tourists)
#   - Trip duration? (1-week sprint vs 3-week journey = very different itineraries)
#   - Travel style? (backpacker, tour group, luxury, food-focused?)
#   - Visa situation? (144-hr transit vs 30-day tourist vs visa-free countries)
#   - Chinese language ability? (affects navigation ease significantly)
#
# Block column: set block = "visa not available" or "seasonal closure" for hard constraints.

title: "China Vacation Destination Selection"
dimensions:
  - name: cultural-depth
    factor: 10
    desc: "Richness of cultural and historical experience — UNESCO sites, living traditions, local character. China's main draw for most visitors. 9-10: world-class heritage, immersive local culture, feels unlike anywhere else; 7-8: significant cultural sites, authentic feel; 5-6: some culture but touristy or diluted; 3-4: modern/generic, could be anywhere; 1-2: culturally barren; 0: no cultural value."
  - name: foreigner-friendly
    factor: 8
    desc: "Ease of navigation for non-Chinese speakers — English signage, translation apps work, locals accustomed to foreigners, restaurants with picture menus. 9-10: extremely foreigner-friendly (Shanghai, Beijing tourist zones); 7-8: manageable with translation app; 5-6: challenging but doable, need preparation; 3-4: very difficult without Chinese; 1-2: nearly impossible without a local guide; 0: inaccessible to foreigners."
  - name: food
    factor: 7
    desc: "Quality and diversity of local cuisine — this is a major reason people visit China. 9-10: one of the world's great food cities/regions (Chengdu, Guangzhou, Xi'an); 7-8: excellent local food scene; 5-6: good food but not a destination for it; 3-4: limited options or tourist-trap restaurants; 1-2: bad food, eat at your hotel; 0: inedible or unsafe."
  - name: logistics
    factor: 6
    desc: "Getting there and around — high-speed rail access, domestic flights, local transport, walkability. 9-10: well-connected by HSR, easy metro/subway, walkable core; 7-8: good connections, manageable transport; 5-6: requires some planning; 3-4: remote, limited transport options; 1-2: very difficult to reach or get around; 0: inaccessible."
  - name: value
    factor: 5
    desc: "Cost vs experience — accommodation, food, attractions, transport relative to quality. 9-10: incredible value, luxury feels cheap; 7-8: good value for money; 5-6: average, what you'd expect; 3-4: overpriced for what you get; 1-2: rip-off; 0: absurdly expensive (relative to China standards)."
  - name: crowd-tolerance
    factor: 4
    desc: "How crowded it gets, especially during Chinese holidays (Golden Week, Spring Festival = avoid at all costs). 9-10: pleasantly uncrowded even in peak season; 7-8: busy but manageable; 5-6: crowded at major sites, fine elsewhere; 3-4: packed, long queues everywhere; 1-2: shoulder-to-shoulder, can't enjoy anything; 0: dangerous crowding."
  - name: scenery
    factor: 6
    desc: "Natural beauty — mountains, rivers, rice terraces, karst landscapes, deserts. China's geography is extraordinarily diverse. 9-10: jaw-dropping natural scenery (Guilin, Zhangjiajie, Jiuzhaigou); 7-8: beautiful landscapes; 5-6: pleasant but not remarkable; 3-4: unremarkable nature; 1-2: ugly or polluted; 0: environmental disaster zone."
