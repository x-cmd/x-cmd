# naming-rust-project.score.yml — Rust crate / Cargo project naming
title: "Rust Project Naming Scoring"
dimensions:
  - name: cargo-compliance
    factor: 8
    desc: "Compliance with Cargo naming conventions: all lowercase snake_case, accepted by cargo new. 9-10: perfectly compliant; 7-8: compliant, minor suggestions; 5-6: technically acceptable but non-idiomatic; 3-4: convention issues (e.g. uppercase); 1-2: non-compliant (illegal characters); 0: rejected by cargo new."
  - name: descriptiveness
    factor: 6
    desc: "Whether the crate name clearly expresses its function and aligns with Rust ecosystem terminology. 9-10: immediately clear what it does, ecosystem-aligned; 7-8: mostly clear; 5-6: vague, needs README; 3-4: easily misinterpreted; 1-2: name doesn't match function; 0: completely misleading."
  - name: crates-io-uniqueness
    factor: 6
    desc: "Whether the name is available on crates.io and distinct from existing crates. 9-10: fully available, no near matches; 7-8: available; 5-6: needs checking for name conflicts; 3-4: close to a known crate; 1-2: same name with different suffix; 0: already taken on crates.io."
  - name: length
    factor: 2
    desc: "Whether the crate name length is reasonable. Rust community favors short, clear names. 9-10: lean and short (≤12 chars), complete meaning; 7-8: moderate; 5-6: slightly long but acceptable; 3-4: on the long side; 1-2: too long; 0: excessively long."
  - name: search-friendly
    factor: 4
    desc: "Whether the name is easily discoverable on crates.io and search engines. 9-10: exact match, unique search result; 7-8: appears in top results; 5-6: needs extra keywords; 3-4: buried under other results; 1-2: very hard to find; 0: unsearchable."
