# house-buy.score.yml — buying a home

# == Notes for Agents ==
# Scenario: buying a home. Much higher stakes than renting — this is likely
# the biggest purchase of the user's life. Financial dimensions dominate.
#
# Ask: budget range? city? family size? school district matters? how long plan to stay?
# Block: over budget, title/deed issues, structural problems found in inspection.

title: "Home Purchase Selection"
dimensions:
  - name: affordability
    factor: 10
    desc: "Total cost vs financial capacity — down payment + monthly mortgage vs income, without becoming house-poor. 9-10: comfortably affordable, mortgage ≤25% of income, solid emergency fund remains; 7-8: within healthy range; 5-6: stretches budget but doable; 3-4: house-poor — most income goes to housing; 1-2: requires co-signer or risky financing; 0: cannot afford without financial disaster."
  - name: location
    factor: 9
    desc: "Commute + neighborhood + future value. You're buying the location as much as the house. 9-10: excellent location — good commute, safe, appreciating area, near amenities; 7-8: solid location; 5-6: acceptable compromises; 3-4: significant location drawbacks; 1-2: bad location — long commute, declining area; 0: dangerous or inaccessible."
  - name: property-condition
    factor: 8
    desc: "Structural integrity, age, systems (HVAC, plumbing, electric), renovation needs. 9-10: move-in ready, well-maintained, recent inspection clean; 7-8: minor cosmetic issues only; 5-6: needs some work but livable; 3-4: significant repairs needed within 2 years; 1-2: major structural issues; 0: tear-down — uninhabitable without full renovation."
  - name: long-term-fit
    factor: 7
    desc: "Will this home still work in 5-10 years — family growth, aging in place, life changes. 9-10: can see yourself here for 10+ years, adapts to life changes; 7-8: good fit for foreseeable future; 5-6: works now, may need to move later; 3-4: already feeling tight or unsuitable; 1-2: buying knowing you'll outgrow it in 2 years; 0: wrong fit from day one."
  - name: investment-value
    factor: 6
    desc: "Appreciation potential, rental demand if you move, neighborhood development trajectory. 9-10: strong indicators of appreciation — new infrastructure, good schools, growing job market; 7-8: likely to hold or grow value; 5-6: stable, no obvious growth catalysts; 3-4: risk of depreciation; 1-2: declining market, falling prices; 0: negative equity trap."
  - name: school-community
    factor: 5
    desc: "School quality and community feel — only matters if you have/want kids or care about resale. 9-10: top-rated schools, vibrant community, neighbors you'd actually know; 7-8: good schools, pleasant neighborhood; 5-6: average; 3-4: below-average schools, isolated; 1-2: poor schools, no community; 0: dangerous schools, hostile neighbors."
