# house-rent.score.yml — house / apartment selection

# == Notes for Agents ==
# Scenario: choosing a place to rent or buy. One of the most consequential
# personal decisions — involves money, commute, lifestyle, and long-term planning.
#
# Before scoring, ask:
#   - Rent or buy? (affects which dimensions matter)
#   - Solo or with family? (school district, safety, space)
#   - Have a car or rely on transit? (commute tolerance)
#   - Pets? (pet-friendly buildings)
#   - Budget range? (sets the candidate pool)
#
# Block column: set block = "over budget" if the candidate exceeds the hard cap.
# Set block = "no pets allowed" if user has pets and building prohibits them.

title: "Rental Apartment Selection Scoring"
dimensions:
  - name: commute
    factor: 8
    desc: "Daily door-to-door time and convenience — not just distance. 9-10: ≤15 min walk or 1-2 metro stops; 7-8: ≤30 min, smooth transfer; 5-6: 30-60 min, acceptable; 3-4: 60-90 min with crowded transfers; 1-2: 90+ min each way; 0: commute would make life miserable."
  - name: price
    factor: 8
    desc: "Monthly rent/mortgage as % of income — includes utilities, property fees, parking. 9-10: ≤20% of income, very comfortable; 7-8: ≤30%, within healthy range; 5-6: 30-40%, tight but doable; 3-4: 40-50%, financial stress; 1-2: 50%+, paycheck-to-paycheck; 0: cannot afford even with cuts elsewhere."
  - name: space-layout
    factor: 6
    desc: "Size, layout, natural light, storage — does it feel good to live in. 9-10: spacious, bright, well-designed layout; 7-8: comfortable, minor compromises; 5-6: adequate but nothing special; 3-4: cramped or dark or awkward layout; 1-2: multiple deal-breakers; 0: uninhabitable."
  - name: neighborhood
    factor: 6
    desc: "Safety, noise, amenities, vibe — what's outside your door. 9-10: safe, quiet, shops/parks within walking distance; 7-8: pleasant, most amenities nearby; 5-6: acceptable but lacking; 3-4: safety concerns or very inconvenient; 1-2: feels unsafe or isolated; 0: dangerous neighborhood."
  - name: landlord-quality
    factor: 4
    desc: "Landlord responsiveness, contract fairness, maintenance speed. 9-10: responsive, fair contract, fixes issues same week; 7-8: reasonable; 5-6: slow but eventually fixes things; 3-4: unresponsive, contract has red flags; 1-2: ignores maintenance requests; 0: scam or illegal clauses."
  - name: stability
    factor: 4
    desc: "How long you can stay — lease term flexibility, landlord sale risk, renovation plans. 9-10: long-term stable, can renew for years; 7-8: stable for foreseeable future; 5-6: some uncertainty; 3-4: likely need to move within a year; 1-2: month-to-month, landlord is selling; 0: eviction risk."
