# travel-weekend.score.yml — weekend getaway selection

# == Notes for Agents ==
# Scenario: choosing a 1-2 day weekend trip. Distance is the limiting factor —
# nobody wants to spend 4 hours driving each way for a 36-hour trip.
#
# Before scoring, ask:
#   - Departure city? Max travel time each way?
#   - Solo, couple, friends, or family with kids?
#   - Relaxation or adventure? (switches which dimensions matter)
#   - Budget per person for the weekend?
#   - Season/weather window?

title: "Weekend Getaway Selection"
dimensions:
  - name: travel-time
    factor: 10
    desc: "Door-to-door time each way — driving, train, or flight+transfer. For a 2-day weekend every hour in transit is an hour not enjoying. 9-10: ≤1 hr, basically in your backyard; 7-8: 1-2 hrs, easy drive; 5-6: 2-3 hrs, doable but eats into the day; 3-4: 3-4 hrs, half the weekend in transit; 1-2: 4+ hrs each way; 0: fly across the country for a weekend — absurd."
  - name: experience
    factor: 8
    desc: "What you'll actually do — hiking, hot springs, food, old towns, beaches, skiing. Must fit a 1-2 day window. 9-10: packed with activities you love, zero filler; 7-8: solid plans, one highlight; 5-6: one good activity, rest is meh; 3-4: struggling to fill the time; 1-2: nothing to do after the first afternoon; 0: you'll be bored by lunch."
  - name: cost
    factor: 6
    desc: "Total weekend cost per person — transport, accommodation, food, activities. 9-10: under ¥300 all-in; 7-8: ¥300-800; 5-6: ¥800-1500; 3-4: ¥1500-3000; 1-2: ¥3000+; 0: costs more than a week-long vacation."
  - name: relaxation
    factor: 5
    desc: "How recharging it is — the whole point of a weekend escape from work. 9-10: come back genuinely refreshed, ready for Monday; 7-8: relaxing, felt like a break; 5-6: fun but tiring; 3-4: come back needing another weekend to recover; 1-2: more stressful than work; 0: actively draining."
  - name: logistics-ease
    factor: 4
    desc: "Planning effort — booking, tickets, reservations, crowds. Weekend trips should be low-friction. 9-10: decide Friday afternoon, leave Saturday morning, zero bookings needed; 7-8: one or two reservations, easy; 5-6: needs some planning; 3-4: needs advance booking, limited availability; 1-2: sold out unless booked weeks ahead; 0: impossible to do spontaneously."
