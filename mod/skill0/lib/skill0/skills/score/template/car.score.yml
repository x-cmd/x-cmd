# car.score.yml — car selection

# == Notes for Agents ==
# Scenario: buying a car — new or used, gas or electric, sedan or SUV.
#
# Before scoring, ask:
#   - Daily use? (commute, family hauler, weekend trips, city parking?)
#   - New or used? (depreciation tolerance)
#   - EV or ICE? (charging access at home/work?)
#   - Budget? (purchase + annual running costs)
#   - Must-have features? (safety ratings, trunk space, carplay?)
#
# Block column: set block = "over budget" or "fails safety requirement".

title: "Car Selection Scoring"
dimensions:
  - name: total-cost
    factor: 8
    desc: "5-year total: purchase price + fuel/charging + insurance + maintenance + depreciation. 9-10: surprisingly affordable over 5 years; 7-8: reasonable for the segment; 5-6: average; 3-4: expensive to own; 1-2: major financial stretch; 0: financially irresponsible."
  - name: reliability
    factor: 8
    desc: "Track record of mechanical reliability, warranty coverage, repair frequency. 9-10: legendary reliability, minimal unscheduled repairs; 7-8: above average; 5-6: average, occasional issues; 3-4: known problem areas; 1-2: frequent breakdowns reported; 0: lemon reputation."
  - name: practicality
    factor: 6
    desc: "Seats, cargo space, child seat compatibility, parking ease for your actual use. 9-10: perfectly fits daily needs; 7-8: good fit; 5-6: workable with compromises; 3-4: awkward for actual use; 1-2: doesn't fit daily needs; 0: completely impractical."
  - name: safety
    factor: 6
    desc: "Crash test ratings, active safety features, driver assistance tech. 9-10: top safety pick+, full ADAS suite; 7-8: strong ratings, good features; 5-6: acceptable; 3-4: below-average ratings; 1-2: known safety issues; 0: safety hazard."
  - name: fuel-efficiency
    factor: 4
    desc: "Energy cost per km — fuel economy for ICE, kWh/100km for EV. 9-10: extremely efficient, minimal running cost; 7-8: good efficiency; 5-6: average; 3-4: thirsty/inefficient; 1-2: gas guzzler; 0: absurdly inefficient."
  - name: enjoyment
    factor: 4
    desc: "Driving experience — handling, comfort, noise, tech, the smile factor. 9-10: genuinely fun to drive every time; 7-8: pleasant; 5-6: fine, gets you there; 3-4: boring or uncomfortable; 1-2: actively unpleasant; 0: miserable to drive."
  - name: resale-value
    factor: 2
    desc: "Expected depreciation and resale demand after 3-5 years. 9-10: holds value exceptionally well; 7-8: above average resale; 5-6: average depreciation; 3-4: depreciates quickly; 1-2: value drops like a rock; 0: nearly worthless after 5 years."
