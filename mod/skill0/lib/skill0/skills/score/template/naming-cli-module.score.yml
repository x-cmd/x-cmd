# naming-x-cmd-mod.score.yml — x-cmd CLI module naming
title: "x-cmd Module Naming Scoring"
dimensions:
  - name: clarity
    factor: 8
    desc: "Whether a non-native speaker can guess the module purpose at first glance. 9-10: instantly understood; 7-8: mostly clear; 5-6: vague, needs explanation; 3-4: easily misunderstood; 1-2: completely unknown words; 0: misleading (e.g. rubric→heading, tally→unknown)."
  - name: compound-structure
    factor: 6
    desc: "Whether it follows the modifier + motion-verb compound structure (e.g. scorecard, testflight). 9-10: natural compound, well-paired morphemes; 7-8: clear compound, reasonable pairing; 5-6: forced but acceptable; 3-4: awkward structure; 1-2: hard concatenation; 0: single morpheme, no distinction."
  - name: cli-friendly
    factor: 8
    desc: "Whether it works well as a CLI command — short, unambiguous, all lowercase, no hyphens. 9-10: very short (4-8 chars), all lowercase, no Tab-completion collision; 7-8: short (≤12 chars), easy to type; 5-6: acceptable length; 3-4: on the long side or has special chars; 1-2: too long or easy to mistype; 0: CLI nightmare (mixed case / special chars)."
  - name: uniqueness
    factor: 4
    desc: "Distinctiveness from existing x-cmd module names. 9-10: highly unique, no confusion possible; 7-8: clearly distinct; 5-6: may be close to an existing module; 3-4: easily confused with existing modules; 1-2: nearly identical; 0: already taken."
  - name: extensibility
    factor: 2
    desc: "Whether the name leaves room for future sub-commands and variants. 9-10: naturally spawns a family of names; 7-8: has extension space; 5-6: workable; 3-4: semantically closed, hard to extend; 1-2: blocks extensions; 0: naming dead end."
