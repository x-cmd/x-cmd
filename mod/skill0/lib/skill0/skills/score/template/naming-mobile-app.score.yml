# naming-mobile-app.score.yml — mobile app naming
title: "Mobile App Naming Scoring"
dimensions:
  - name: store-visibility
    factor: 8
    desc: "Whether the name is discoverable in App Store / Google Play search. 9-10: Top 3 on core search terms; 7-8: first page; 5-6: findable within first few pages; 3-4: needs very precise search; 1-2: nearly unfindable; 0: unreachable via search."
  - name: memorability
    factor: 8
    desc: "Whether users remember after one exposure and recognize on their home screen. 9-10: remembered instantly, recognized at a glance; 7-8: easy to remember; 5-6: needs a few exposures; 3-4: easily forgotten or confused; 1-2: very hard to remember; 0: leaves no trace."
  - name: store-compliance
    factor: 6
    desc: "Compliance with Apple/Google naming policies and trademark requirements. 9-10: fully compliant, length within limit (≤30 chars); 7-8: compliant; 5-6: may need subtitle adjustment; 3-4: has risk factors; 1-2: likely rejected; 0: clearly violating."
  - name: uniqueness
    factor: 6
    desc: "Distinctiveness from competing apps in the same category. 9-10: unique in the category; 7-8: highly distinctive; 5-6: differentiated; 3-4: close to another app name; 1-2: easily confused; 0: identical to a well-known app."
  - name: cross-region
    factor: 4
    desc: "Whether the name has negative meanings or ambiguities in target market languages. 9-10: no negative in any target market; 7-8: fine in key markets; 5-6: some markets need attention; 3-4: problematic in a key market; 1-2: multiple negative connotations; 0: market disaster."
