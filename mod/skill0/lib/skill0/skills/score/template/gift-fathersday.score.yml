# gift-fathersday.score.yml — Father's Day gift selection

# == Notes for Agents ==
# Scenario: Father's Day gift. Dad gifts are notoriously hard — dads often
# say they don't want anything and mean it. Practical, usable gifts win.
# Shared experiences (fishing, BBQ, sports) often beat physical items.

title: "Father's Day Gift Selection"
dimensions:
  - name: usability
    factor: 10
    desc: "Will he actually use it — regularly, not once and forget. Dads value function. 9-10: becomes part of his daily/weekly routine — the tool he reaches for, the grill accessory he uses every weekend, the gadget that simplifies his life; 7-8: genuinely useful, used often; 5-6: useful occasionally; 3-4: used once then stored; 1-2: will sit in the garage untouched; 0: completely useless to him."
  - name: hobby-alignment
    factor: 9
    desc: "Does it fit his specific hobby or interest — golf, fishing, cars, tech, cooking, gardening. A generic 'dad gift' is worse than nothing. 9-10: perfect for HIS specific hobby — shows you know what he's into right now, maybe even something he didn't know existed but immediately wants; 7-8: clearly fits his interests; 5-6: tangentially related to his hobby; 3-4: generic dad gift (another tie, another mug); 1-2: unrelated to anything he enjoys; 0: something he actively dislikes."
  - name: quality
    factor: 7
    desc: "Build quality and durability — dads appreciate things that last. 9-10: exceptionally well-made, clearly built to last decades; 7-8: solid quality; 5-6: decent; 3-4: feels cheap; 1-2: will break within months; 0: disposable junk."
  - name: shared-experience
    factor: 6
    desc: "Does it create an opportunity to spend time together. Many dads value this more than things. 9-10: IS a shared experience — tickets to a game together, a fishing trip, cooking a meal together; 7-8: enables quality time; 5-6: could involve him in setup/use; 3-4: solo-use item; 1-2: isolates him; 0: anti-social gift."
  - name: effort-visible
    factor: 4
    desc: "Did you think about it or just buy 'a dad thing'. 9-10: clearly researched or made — he can tell you put thought into it; 7-8: effort visible; 5-6: some thought evident; 3-4: looks like a quick purchase; 1-2: generic last-minute grab; 0: obviously regifted."
