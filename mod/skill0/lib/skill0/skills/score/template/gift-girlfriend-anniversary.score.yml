# gift-girlfriend-anniversary.score.yml — anniversary gift for girlfriend

# == Notes for Agents ==
# Scenario: anniversary gift. Different from Valentine's — this is about YOUR relationship,
# not a universal holiday. Nostalgia, shared memories, and relationship milestones
# matter more than generic romance.
#
# Key difference from Valentine's: nostalgia and meaning > surprise and effort.
# The best anniversary gift references your shared history.

title: "Anniversary Gift for Girlfriend Selection"
dimensions:
  - name: nostalgia
    factor: 10
    desc: "How well the gift references your shared history — first date, inside jokes, meaningful places, 'our song'. Anniversaries are about YOUR story. 9-10: deeply references specific moments in your relationship — recreates your first date, a framed map of where you met, a playlist of songs from your first year together; 7-8: clearly tied to your history together; 5-6: has some personal meaning; 3-4: could be for any couple; 1-2: zero connection to your relationship; 0: feels like it was bought for a different girlfriend."
  - name: meaning-depth
    factor: 10
    desc: "The emotional weight — does it say 'I've been paying attention for [X] years'. 9-10: profoundly meaningful — she'll cry (happy tears), it captures exactly what your relationship means; 7-8: very meaningful, clearly heartfelt; 5-6: sweet, nice sentiment; 3-4: shallow, surface-level romance; 1-2: meaningless, generic; 0: feels hollow or obligatory."
  - name: personal-fit
    factor: 8
    desc: "How specifically for HER — after [X] years together, you should know her taste precisely. 9-10: exactly what she wanted but didn't ask for — proof you listen; 7-8: perfect for her taste; 5-6: good, she'll like it; 3-4: slightly off — like you don't quite know her; 1-2: clearly wrong for her; 0: something she explicitly said she hates."
  - name: milestone-weight
    factor: 6
    desc: "Whether the gift matches the anniversary number — 1st vs 5th vs 10th have different expectations. 9-10: perfectly calibrated to the milestone — the 5th anniversary gift feels like a 5th anniversary gift, not a 3-month gift or a wedding gift; 7-8: appropriate weight; 5-6: slightly off but acceptable; 3-4: feels too small for the milestone or too big and awkward; 1-2: completely misjudged the occasion weight; 0: insultingly mismatched (paper for 10th gold anniversary)."
  - name: longevity
    factor: 6
    desc: "Will she still have and treasure this 5 years from now. Anniversaries are about permanence. 9-10: a forever keepsake — she'll show your grandchildren; 7-8: will be treasured for years; 5-6: will last a while; 3-4: temporary; 1-2: disposable; 0: gone in a day."
  - name: effort-signal
    factor: 4
    desc: "Visible effort and planning. After years together, effort still counts — maybe more. 9-10: clearly planned well in advance, layers of thought, orchestrated; 7-8: significant effort visible; 5-6: reasonable effort; 3-4: minimal effort for an anniversary; 1-2: last-minute panic buy; 0: clearly forgot until the day before."
  - name: romance
    factor: 6
    desc: "The romantic feeling — not the same as nostalgia. Romance is about NOW, nostalgia is about THEN. 9-10: deeply romantic, makes her feel desired and in love all over again; 7-8: romantic and warm; 5-6: sweet but not particularly romantic; 3-4: lacking romance; 1-2: zero romance; 0: anti-romantic."
