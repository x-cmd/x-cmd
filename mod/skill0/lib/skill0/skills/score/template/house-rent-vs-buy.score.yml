# house-rent-vs-buy.score.yml — rent vs buy decision

# == Notes for Agents ==
# Scenario: the classic "should I rent or buy?" This is NOT comparing specific
# properties — it's comparing two life strategies. The targets are "Rent" and "Buy".
# Score them as strategies for the user's specific situation (city, career stage, savings).
#
# Ask: city? income/savings? how long plan to stay? career stability? family plans?
# This template surfaces the hidden costs people forget: opportunity cost of down payment,
# maintenance burden, flexibility value, emotional weight of debt.

title: "Rent vs Buy Decision"
dimensions:
  - name: financial-sense
    factor: 10
    desc: "Pure math — price-to-rent ratio, mortgage vs rent comparison, opportunity cost of down payment invested elsewhere. 9-10: clearly the smarter financial move in this market; 7-8: likely better financially; 5-6: roughly break-even over 10 years; 3-4: probably costs more in the long run; 1-2: financially disadvantageous; 0: financial suicide at current prices/income."
  - name: flexibility
    factor: 8
    desc: "Ability to move for career, relationship, or life changes without major friction. 9-10: total freedom — can relocate in 30 days; 7-8: very flexible; 5-6: some constraints but manageable; 3-4: selling would take months and cost 5-6% in fees; 1-2: trapped — can't afford to sell, can't afford to stay; 0: golden handcuffs — completely stuck."
  - name: stability
    factor: 7
    desc: "Certainty of housing costs and ability to stay put — no landlord can evict you, no rent hikes. 9-10: fixed-cost, permanent home, nobody can make you leave; 7-8: very stable; 5-6: moderate stability; 3-4: at mercy of landlord or market; 1-2: housing insecurity; 0: could lose housing at any moment."
  - name: monthly-budget
    factor: 6
    desc: "Actual monthly cash outflow — mortgage + tax + insurance + maintenance vs rent. Rent is the maximum you pay; mortgage is the minimum. 9-10: significantly lower monthly cost, frees up cash for life; 7-8: comfortable monthly payment; 5-6: manageable but noticeable; 3-4: stretches monthly budget; 1-2: paycheck-to-paycheck with this housing cost; 0: cannot afford monthly payments."
  - name: maintenance-burden
    factor: 4
    desc: "Who fixes the leaking roof, broken water heater, clogged pipes. Homeowners do it all. 9-10: zero maintenance responsibility — someone else's problem; 7-8: minor DIY only; 5-6: manageable maintenance; 3-4: constant repairs eating weekends and savings; 1-2: money pit — everything is breaking; 0: second full-time job maintaining the property."
  - name: emotional-fit
    factor: 4
    desc: "How each option FEELS — pride of ownership vs anxiety of debt, freedom of renting vs impermanence. 9-10: feels right for this stage of life — whether that's ownership pride or renter freedom; 7-8: mostly comfortable with this path; 5-6: mixed feelings; 3-4: anxious or conflicted about this choice; 1-2: dread or resentment; 0: makes you deeply unhappy."
