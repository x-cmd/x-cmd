# naming-python-project.score.yml — Python package / pip package naming
title: "Python Project Naming Scoring"
dimensions:
  - name: pep8-compliance
    factor: 6
    desc: "Compliance with PEP 8 module naming: all lowercase, underscores allowed, importable. 9-10: perfectly PEP 8 compliant; 7-8: compliant, reasonable underscore usage; 5-6: uses hyphens (not recommended); 3-4: contains uppercase; 1-2: contains special characters; 0: cannot be imported."
  - name: pypi-uniqueness
    factor: 8
    desc: "Whether the name is available on PyPI and distinct from existing packages. 9-10: fully available, no near matches; 7-8: available; 5-6: needs checking; 3-4: easily confused with an existing package; 1-2: differs only by suffix; 0: already taken on PyPI."
  - name: import-friendly
    factor: 6
    desc: "Whether it works well as an import statement — short, unambiguous, no stdlib collision. 9-10: very short, no collision with stdlib or popular packages; 7-8: short, no conflicts; 5-6: acceptable; 3-4: on the long side or near a known package name; 1-2: collides with stdlib; 0: collides with a keyword."
  - name: descriptiveness
    factor: 4
    desc: "Whether the package name clearly expresses its function. 9-10: instantly clear what it does; 7-8: mostly clear; 5-6: needs README supplement; 3-4: easily misinterpreted; 1-2: name doesn't match function; 0: completely misleading."
  - name: community-fit
    factor: 2
    desc: "Whether the name aligns with Python community conventions (e.g. requests not pyrequests). 9-10: fits perfectly into the Python ecosystem; 7-8: follows conventions; 5-6: neutral; 3-4: doesn't quite fit conventions; 1-2: anti-pattern (e.g. excessive prefixing); 0: breaks community expectations."
