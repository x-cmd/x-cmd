# general.score.yml — general weighted scoring

# == Notes for Agents ==
# This is the blank-slate starting point. Use when no specific template fits.
#
# Before using:
#   - Ask the user: "When picking a <thing>, what matters most to you?"
#   - Extract 3-5 dimensions from their answer
#   - Assign factors based on what they emphasize
#   - Write concrete 0-10 anchors in desc
#
# This template has all factors = 2 (baseline). That's intentional —
# it forces you to think about relative importance rather than copying defaults.
#
# Draft then iterate: run with your best guess, show the results, refine.

title: "General Weighted Scoring"
dimensions:
  - name: dim-a
    factor: 2
    desc: "Describe this dimension. Include what a high score (9-10) and low score (1-2) mean."
  - name: dim-b
    factor: 2
    desc: "Describe this dimension. Include what a high score (9-10) and low score (1-2) mean."
  - name: dim-c
    factor: 2
    desc: "Describe this dimension. Include what a high score (9-10) and low score (1-2) mean."
