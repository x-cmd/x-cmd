# plant-cat.score.yml — cat-safe indoor plant selection

# == 给 Agent 的提醒 ==
# 此模板为「有猫家庭」特化版——宠物安全因子拉满。使用前请根据实际情况调整：
#
# 硬过滤（block 列）：
#   TSV 中有一个可选的 `block` 列放在 target 后面。填了内容=该候选被淘汰，自动排到最后，rank 显示 X。
#   用法：在 score.tsv 中，对有毒植物填 `block → toxic to cats`，compute 自动把它们沉底。
#   这不是罚分——是直接不可用。跟 rule 的 error 一样：命中就出局。
#
# 常见调整：
#   - 也有狗？→ 宠物安全评分标准需同时覆盖狗（有些植物对猫无毒但对狗有毒）
#   - 猫完全不碰植物？→ 去掉 block 列，宠物安全因子降到 4-6，有毒植物放高处即可
#   - 多猫家庭？→ 加「耐猫性」因子到 8-10
#   - 室外/阳台？→ 加「耐晒」「耐寒」，去掉「耐阴性」
#   - 想开花？→ 加「花期」「花香」「复花难度」（蝴蝶兰对猫无毒，但百合绝对不行！）
#   - 新手？→ 养护难度因子拉到 10
#   - 预算紧？→ 价格因子调高
#
# 安全第一：不确定某植物对猫是否安全时，查 ASPCA 有毒植物数据库。
# 百合科（Lilium）、天南星科（Araceae 含绿萝龟背竹白掌）是猫的常见杀手。

title: "Cat-Safe Indoor Plant Selection"

dimensions:
  - name: 宠物安全
    factor: 10
    desc: "对猫是否安全——是否含草酸钙结晶、皂苷、百合碱等猫致命物质。猫啃叶片或咬茎后是否会中毒。9-10: 完全无毒，啃了没事；7-8: 基本安全，可能轻微刺激；5-6: 有轻微毒性但猫一般不碰；3-4: 明确有毒（呕吐腹泻口腔刺激）；1-2: 对猫剧毒（肾衰竭等严重后果）；0: 对猫致命（如百合科——花粉都能致死）。"
    # 这是硬指标——用户有猫时不可降低此因子。如果猫完全不碰植物可降到 6

  - name: 养护难度
    factor: 8
    desc: "养活难度——浇水频率、对湿度敏感度、出差一周会不会死、对新手友好度。9-10: 几乎养不死，忘浇水也没事；7-8: 基本皮实，偶尔疏忽能扛；5-6: 需要规律养护；3-4: 娇气，环境一变就黄叶；1-2: 需要专业知识；0: 新手必死。"
    # 如果用户是新手或经常出差，因子可提到 10-12

  - name: 观赏性
    factor: 6
    desc: "颜值——叶形、株型、颜色、是否自带网红气质。9-10: 颜值天花板，放哪里都是焦点；7-8: 很好看；5-6: 中规中矩；3-4: 普通；1-2: 不太好看；0: 毫无观赏价值。"
    # 可拆分为叶形/株型/颜色等子维度

  - name: 耐阴性
    factor: 6
    desc: "对低光的容忍度——北向房间、离窗户远能否存活。9-10: 几乎无光也能活；7-8: 散射光即可；5-6: 需要明亮散射光；3-4: 需要一定直射光；1-2: 必须强光；0: 没有阳光就死。"
    # 如果用户有南向大窗/阳台，可换成「耐晒」「抗强光」

  - name: 耐猫性
    factor: 6
    desc: "猫会不会把它当玩具——是否抗咬抗刨抗推倒、悬挂/高处可否避开。9-10: 猫不感兴趣或完全抗造；7-8: 基本不怕猫；5-6: 需要摆在高处或挂起来；3-4: 猫一定会去啃；1-2: 猫见必毁；0: 和猫无法共存。"
    # 多猫家庭因子提到 8-10。猫不碰植物的家庭可删除此维度

  - name: 价格
    factor: 2
    desc: "常见规格购买价格。9-10: ¥20以内；7-8: ¥20-50；5-6: ¥50-150；3-4: ¥150-500；1-2: ¥500+；0: 买不起。"
    # 预算敏感时因子调高；追求稀有植物时删除此维度
