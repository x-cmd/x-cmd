# naming-ai-skill.score.yml — AI skill / agent naming
title: "AI Skill Naming Scoring"
dimensions:
  - name: action-oriented
    factor: 10
    desc: "Whether the skill name clearly expresses an action (verb or action noun). 9-10: precise verb, action semantics clear (e.g. review, deploy, scan); 7-8: action word, mostly clear; 5-6: action is vague; 3-4: noun-like, doesn't feel actionable; 1-2: static noun, no action sense; 0: completely non-actionable."
  - name: brevity
    factor: 8
    desc: "Whether the skill name is short enough for frequent invocation in conversation. 9-10: single precise word (≤6 chars) e.g. lint, scan, fix; 7-8: short (≤10 chars); 5-6: acceptable length; 3-4: on the long side, inconvenient; 1-2: too long; 0: impractical for daily typing."
  - name: discoverability
    factor: 6
    desc: "Whether a user can naturally guess and try this skill name without being told. 9-10: highly discoverable, consistent naming convention; 7-8: easy to guess; 5-6: needs a reminder to think of it; 3-4: weak association between name and function; 1-2: very hard to discover; 0: only the author understands."
  - name: non-overlap
    factor: 6
    desc: "Distinctiveness from existing skills/agents, avoiding functional overlap. 9-10: fully independent, clean semantic boundary; 7-8: clearly distinct; 5-6: slight overlap but not serious; 3-4: functional scope overlaps with another skill; 1-2: nearly duplicate; 0: complete conflict."
  - name: prompt-friendly
    factor: 4
    desc: "Whether the skill name triggers naturally in prompt context without false positives. 9-10: natural conversational integration, accurate triggering; 7-8: triggers mostly accurately; 5-6: occasional false triggers; 3-4: frequently false-triggers or missed; 1-2: hard to trigger; 0: conflicts heavily with common conversation."
  - name: extensibility
    factor: 2
    desc: "Whether the name leaves room for skill variants (e.g. test → test-lint, test-run, test-coverage). 9-10: naturally forms a naming family; 7-8: has extension space; 5-6: workable; 3-4: occupies namespace; 1-2: blocks future extensions; 0: naming dead end."
