# tech-stack.score.yml — tech stack comparison
title: "Tech Stack Selection Scoring"
dimensions:
  - name: project-fit
    factor: 8
    desc: "Whether the technology is naturally suited to the project's type and scale. 9-10: built for this type (e.g. Python for data, Rust for systems); 7-8: well-suited; 5-6: works but not optimal; 3-4: awkward fit (hammer for a screw); 1-2: clearly unsuitable; 0: completely wrong choice."
  - name: team-capability
    factor: 6
    desc: "Match between team's existing skills and the technology's learning curve. 9-10: team already proficient, zero ramp-up; 7-8: experienced, small learning curve; 5-6: 1-2 weeks to onboard; 3-4: 1+ month training needed; 1-2: team starts from zero; 0: team cannot master."
  - name: ecosystem-maturity
    factor: 6
    desc: "Richness and quality of libraries, tools, community, and documentation. 9-10: rich ecosystem, production-grade toolchain; 7-8: main needs have mature solutions; 5-6: core covered, edges need custom work; 3-4: weak ecosystem, much must be built; 1-2: barren ecosystem; 0: abandoned zombie technology."
  - name: performance-scale
    factor: 4
    desc: "Performance and scalability at current and projected future load. 9-10: well exceeds requirements with headroom; 7-8: meets with buffer; 5-6: just meets; 3-4: near bottleneck; 1-2: barely adequate now, no headroom; 0: fails baseline performance."
  - name: maintenance
    factor: 6
    desc: "Long-term maintenance risk: maintainer activity, LTS policy, talent market. 9-10: long-term stable, backed by large company or active foundation; 7-8: well maintained; 5-6: moderate risk; 3-4: uncertain maintenance; 1-2: may be deprecated; 0: already unmaintained."
  - name: integration-cost
    factor: 4
    desc: "Difficulty of integrating with existing systems, CI/CD, monitoring, deployment pipelines. 9-10: seamless integration; 7-8: minor adaptation needed; 5-6: requires some rework; 3-4: complex integration; 1-2: needs heavy custom solution; 0: incompatible with existing stack."
