# naming-github-repo.score.yml — GitHub repo naming
title: "GitHub Repo Naming Scoring"
dimensions:
  - name: discoverability
    factor: 8
    desc: "Whether the name is easily found in GitHub search and contains core keywords. 9-10: direct hit on core search terms; 7-8: findable with few qualifiers; 5-6: needs exact search; 3-4: buried under same-name repos; 1-2: nearly unsearchable; 0: unreachable via search."
  - name: descriptiveness
    factor: 6
    desc: "Whether the repo name clearly expresses the project's purpose. 9-10: name says it all, no README needed; 7-8: mostly clear; 5-6: needs a tagline supplement; 3-4: easily misinterpreted; 1-2: name doesn't match content; 0: completely misleading."
  - name: brevity
    factor: 4
    desc: "Whether the length is reasonable for clone/ref usage. 9-10: lean (≤15 chars), complete meaning; 7-8: moderate; 5-6: slightly long; 3-4: on the long side; 1-2: too long; 0: excessively long."
  - name: uniqueness
    factor: 4
    desc: "Distinctiveness from similar projects. 9-10: unique in the domain; 7-8: highly distinctive; 5-6: differentiated; 3-4: easily confused with a well-known project; 1-2: nearly identical; 0: already taken."
  - name: kebab-case
    factor: 1
    desc: "Compliance with GitHub naming conventions: all lowercase, hyphens not underscores. 9-10: perfectly conformant; 7-8: conformant; 5-6: uses underscores; 3-4: mixed case; 1-2: special characters; 0: completely non-standard."
