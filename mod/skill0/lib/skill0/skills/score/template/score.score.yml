# score.score.yml — scoring standard example (teaching template)

# == Notes for Agents ==
# This template exists to show the format, not to be used directly.
# Use `general` or a specific scenario template instead.
#
# It demonstrates:
#   - Factor 4 = 2× baseline (dim-b matters more than dim-a)
#   - Factor 1 = minor consideration (dim-c is barely relevant)
#   - Name is the TSV column key — keep it short and semantic

title: "Scoring Standard"
dimensions:
  - name: dim-a
    factor: 2
    desc: "Describe this dimension and what high/low scores mean."
  - name: dim-b
    factor: 4
    desc: "Describe this dimension and what high/low scores mean."
  - name: dim-c
    factor: 1
    desc: "Describe this dimension and what high/low scores mean."
