# migration.score.yml — migration strategy comparison
title: "Migration Strategy Selection Scoring"
dimensions:
  - name: risk-control
    factor: 8
    desc: "How well the migration strategy protects business continuity — rollback capability, batching, safety net. 9-10: every step reversible, graceful degradation, rollback tested; 7-8: risk controlled, key steps reversible; 5-6: some rollback but not full coverage; 3-4: significant risk, rollback difficult; 1-2: high risk, one-shot switch of fate; 0: no rollback, failure means disaster."
  - name: business-impact
    factor: 8
    desc: "Degree of user and business disruption during migration. 9-10: user-invisible migration; 7-8: brief impact but acceptable; 5-6: requires maintenance window; 3-4: extended service interruption; 1-2: prolonged service degradation; 0: full shutdown migration."
  - name: implementation-complexity
    factor: 4
    desc: "Engineering effort, technical difficulty, and dependency coordination required. 9-10: straightforward, low effort; 7-8: manageable; 5-6: requires careful planning and execution; 3-4: large effort, multi-team coordination; 1-2: extremely complex; 0: nearly impossible to implement."
  - name: verification
    factor: 6
    desc: "Availability of verification methods: dual-write comparison, traffic mirroring, automated testing. 9-10: full dual-write comparison + automated verification; 7-8: critical paths verified; 5-6: partial verification coverage; 3-4: insufficient verification; 1-2: manual spot-checking only; 0: no verification."
  - name: time-window
    factor: 2
    desc: "Whether the migration timeline aligns with business calendar — low season/peak, contract cycles, freezes. 9-10: ample time window, aligned with business rhythm; 7-8: acceptable timeframe; 5-6: tight but workable; 3-4: insufficient time; 1-2: forced to rush; 0: impossible to complete within deadline."
