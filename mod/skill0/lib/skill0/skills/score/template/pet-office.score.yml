# pet-office.score.yml — office pet selection
title: "Office Pet Selection"
dimensions:
  - name: office-fit
    factor: 10
    desc: "How well the pet adapts to an office environment — noise level, space requirements, mess, odor. 9-10: silent, compact, zero mess; 7-8: minor adjustments needed; 5-6: moderate impact on office; 3-4: disruptive to work; 1-2: incompatible with office; 0: dangerous or illegal in workplace."
  - name: maintenance
    factor: 8
    desc: "Daily and weekly upkeep burden — feeding frequency, cleaning, vet visits, care complexity. 9-10: feed once a week, minimal cleaning; 7-8: low daily commitment; 5-6: moderate care routine; 3-4: high-maintenance, needs dedicated person; 1-2: requires professional care; 0: full-time job to maintain."
  - name: interactivity
    factor: 6
    desc: "How engaging and stress-relieving the pet is for employees — can they pet, play, watch, or interact. 9-10: highly interactive, proven stress relief; 7-8: engaging to interact with; 5-6: pleasant to observe; 3-4: limited interaction; 1-2: no interaction possible; 0: causes stress instead of relieving it."
  - name: allergy-risk
    factor: 8
    desc: "Risk of allergic reactions among staff — dander, fur, bedding dust, feed. 9-10: zero allergens, hypoallergenic; 7-8: minimal risk, easily contained; 5-6: low risk but possible; 3-4: known common allergen; 1-2: high allergy risk for many people; 0: severe allergen, unsafe for shared space."
  - name: cost
    factor: 4
    desc: "Total cost of ownership — setup (enclosure, supplies) + monthly ongoing (food, bedding, vet). 9-10: negligible setup and ongoing; 7-8: low cost; 5-6: moderate budget needed; 3-4: significant investment; 1-2: expensive to maintain; 0: prohibitively expensive for office budget."
  - name: lifespan
    factor: 4
    desc: "Commitment length — shorter lifespan means less long-term responsibility but also less bonding. 9-10: 2-5 years, manageable commitment; 7-8: either short and sweet or long and stable; 5-6: moderate commitment; 3-4: unexpectedly long or too short; 1-2: decades-long burden; 0: lifespan creates ethical concerns."
  - name: safety
    factor: 6
    desc: "Risk of bites, scratches, zoonotic disease, escape, or liability issues. 9-10: no bite/scratch risk, no disease concern; 7-8: minimal risk, easily managed; 5-6: minor risk with proper handling; 3-4: known bite/scratch risk; 1-2: significant safety concern; 0: dangerous, liability issue for company."
