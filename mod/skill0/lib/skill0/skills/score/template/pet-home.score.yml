# pet-home.score.yml — home pet selection
dimensions:
  - name: companionship
    factor: 10
    desc: "Depth of emotional bond — does the pet seek affection, recognize family, provide comfort. 9-10: deeply bonded, actively seeks cuddles and interaction; 7-8: warm and responsive; 5-6: pleasant presence but independent; 3-4: tolerates handling, indifferent; 1-2: no bond possible; 0: avoids human contact."
  - name: daily-care
    factor: 6
    desc: "Daily time commitment — feeding, exercise, cleaning, grooming. 9-10: minimal (≤5 min/day); 7-8: low (≤15 min); 5-6: moderate (30 min); 3-4: significant (1+ hour); 1-2: dominates schedule; 0: full-time care."
  - name: space-need
    factor: 6
    desc: "Space required — small apartment vs needs yard/extra room. 9-10: fits in any home; 7-8: small dedicated corner; 5-6: needs a room or large enclosure; 3-4: needs yard or dedicated room; 1-2: requires large outdoor space; 0: cannot be kept indoors."
  - name: family-safe
    factor: 8
    desc: "Safety around children, elderly, visitors — bite risk, disease, temperament. 9-10: zero risk for all ages; 7-8: safe with basic supervision; 5-6: needs handling knowledge; 3-4: known risks for young children; 1-2: not recommended for families; 0: dangerous."
  - name: quietness
    factor: 6
    desc: "Noise level — barking, chirping, night activity. Critical for apartments. 9-10: completely silent; 7-8: occasional soft sounds; 5-6: noticeable but tolerable; 3-4: regularly noisy; 1-2: disturbs neighbors; 0: constant loud noise."
  - name: shedding
    factor: 4
    desc: "Fur, dander, dust, bedding debris in the home. 9-10: zero shedding or mess; 7-8: minimal, easily contained; 5-6: moderate cleanup; 3-4: significant, daily cleanup needed; 1-2: fur everywhere; 0: unmanageable."
  - name: trainability
    factor: 4
    desc: "Can the pet be house-trained, learn commands, adapt to routines. 9-10: highly trainable, fully housebroken; 7-8: learns basic routines; 5-6: limited training; 3-4: difficult; 1-2: untrainable; 0: resistant."
  - name: cost
    factor: 4
    desc: "First-year total + annual ongoing (food, vet, supplies). 9-10: under ¥500/yr; 7-8: under ¥2,000/yr; 5-6: ¥2,000-5,000/yr; 3-4: ¥5,000-15,000/yr; 1-2: ¥15,000+/yr; 0: prohibitive."
