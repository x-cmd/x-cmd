# movie.score.yml — movie / show selection
# == Notes for Agents ==
# Scenario: the nightly "what should we watch?" paralysis. 30 minutes scrolling Netflix.
# Ask: mood? alone or with someone? how much attention do you want to give? language?
# x-cmd: browse movie info with x nihao --llmstxt

title: "Movie & Show Selection"
dimensions:
  - name: mood-match
    factor: 10
    desc: "Does it match the mood you're actually in right now. 9-10: exactly what you wanted to feel — laugh, cry, thrill, think; 7-8: fits the mood well; 5-6: kind of fits; 3-4: wrong mood — comedy when you wanted tension; 1-2: completely mismatched; 0: would actively worsen your mood."
  - name: time-fit
    factor: 7
    desc: "Does the runtime fit your available window. 9-10: perfect length — start to finish in your window, no rushing; 7-8: fits with minor adjustment; 5-6: slightly too long or short but manageable; 3-4: need to split across two sittings; 1-2: way too long for tonight; 0: requires a full-day commitment."
  - name: engagement
    factor: 7
    desc: "Does it hold attention or require it — some nights you want to be gripped, others you want background. 9-10: perfectly pitched engagement — either riveting or pleasantly undemanding, exactly what you wanted; 7-8: good level of engagement; 5-6: drags in places or demands more attention than expected; 3-4: boring or exhausting; 1-2: can't stay awake / can't look away to check phone; 0: unwatchable."
  - name: rewatch-value
    factor: 3
    desc: "Will you think about it tomorrow. 9-10: stays with you — you'll bring it up in conversation; 7-8: memorable, worth recommending; 5-6: entertained but forgettable; 3-4: forget you watched it within a week; 1-2: regret the time spent; 0: actively worse for having watched it."
