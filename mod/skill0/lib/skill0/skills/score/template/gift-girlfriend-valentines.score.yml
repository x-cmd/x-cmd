# gift-girlfriend-valentines.score.yml — Valentine's Day gift for girlfriend

# == Notes for Agents ==
# Scenario: Valentine's Day gift. Higher stakes than a regular gift —
# this is THE romantic holiday. Effort and emotional impact matter more than price.
#
# Key difference from generic gift: romance and surprise-delight dominate.
# Practicality barely matters. It's about the feeling.

title: "Valentine's Gift for Girlfriend Selection"
dimensions:
  - name: romance
    factor: 10
    desc: "How romantic the gift feels — does it say 'I love you' without words. Valentine's Day is not about utility. 9-10: deeply romantic, makes her feel cherished and desired — the kind of gift she tells her friends about; 7-8: clearly romantic, warm and heartfelt; 5-6: nice but not particularly romantic; 3-4: feels like any other day's gift; 1-2: zero romance — a power bank; 0: actively unromantic — a vacuum cleaner."
  - name: surprise-delight
    factor: 10
    desc: "The emotional moment of opening it — tears, gasps, 'how did you know?!'. 9-10: genuinely surprised, visibly moved, a core memory created; 7-8: big genuine smile, clearly delighted; 5-6: happy, appreciative; 3-4: mild smile, polite 'thank you'; 1-2: no emotional reaction; 0: disappointed or confused."
  - name: personal-fit
    factor: 8
    desc: "How specifically for HER this gift is — not what any girlfriend would like, but what SHE would like. 9-10: feels hand-picked based on deep knowledge of her — references an inside joke, a conversation from months ago, her exact taste; 7-8: clearly chosen with her in mind; 5-6: good gift, could be for many people; 3-4: generic Valentine's gift (chocolate + flowers combo); 1-2: zero personalization; 0: feels like you grabbed the first thing you saw."
  - name: effort-signal
    factor: 8
    desc: "Visible effort — planning, time, thought, possibly handmade. On Valentine's Day, effort = love. 9-10: clearly took significant time and planning — planned weeks ahead, handmade elements, orchestrated an experience; 7-8: clearly put thought and effort into it; 5-6: reasonable effort visible; 3-4: last-minute rush job detectable; 1-2: zero effort — ordered on Amazon on Feb 13; 0: forgot and grabbed gas station flowers on the way."
  - name: presentation
    factor: 6
    desc: "Wrapping, setting, delivery — the moment of reveal. 9-10: gorgeous presentation, the unboxing IS the moment — rose petals, candlelight, perfect timing; 7-8: beautifully wrapped, nice setting; 5-6: nicely presented; 3-4: minimal effort on presentation; 1-2: no wrapping or ugly packaging; 0: handed over in a plastic bag."
  - name: longevity
    factor: 4
    desc: "How long the gift lasts — consumable (days), durable (years), memory (forever). 9-10: lasts forever — an experience memory, a piece of jewelry she'll wear daily, a handwritten letter she'll keep; 7-8: long-lasting; 5-6: decent lifespan; 3-4: short-lived; 1-2: wilts in 3 days (flowers without anything else); 0: disposable, gone tomorrow."
