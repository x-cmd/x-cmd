# plant-indoor.score.yml — indoor plant selection

# == 给 Agent 的提醒 ==
# 以下维度是基于"普通室内绿植"场景的默认标准。使用前请根据用户实际需求调整：
#
# 常见需要增删/调整的维度：
#   - 有宠物？→ 宠物安全因子提到 8-10，或直接加「有毒=淘汰」硬过滤
#   - 有小孩？→ 考虑加「儿童安全」维度（刺、有毒浆果、过敏）
#   - 阳台/室外？→ 加「耐晒」「耐寒」「抗风」，去掉「耐阴性」
#   - 怕虫？→ 加「易生虫」（红蜘蛛、介壳虫、小黑飞）、「招蚊」（水培积水）
#   - 想开花？→ 加「花期长度」「花色」「花香」「复花难度」
#   - 想能吃？→ 加「食用价值」（香草、辣椒、小番茄）
#   - 新手？→ 养护难度因子拉到 10，其他降
#   - 花粉过敏？→ 加「花粉量」维度
#   - 出差多？→ 加「耐旱天数」
#   - 预算紧？→ 价格因子调高
#   - 风水需求？→ 加「寓意」（发财树、金钱树等）
#   - 水培偏好？→ 加「水培可行性」（不用土不招虫）
#
# 抛砖引玉：先用默认维度跑一版给用户看，用户自然会告诉你漏了什么。

title: "Indoor Plant Selection"

dimensions:
  - name: 养护难度
    factor: 10
    desc: "养活难度——浇水频率、对湿度敏感度、出差一周会不会死、对新手友好度。9-10: 几乎养不死，忘浇水也没事；7-8: 基本皮实，偶尔疏忽能扛；5-6: 需要规律养护；3-4: 娇气，环境一变就黄叶；1-2: 需要专业知识；0: 新手必死。"
    # 如果用户是新手或经常出差，因子可提到 12-14

  - name: 观赏性
    factor: 8
    desc: "颜值——叶形、株型、颜色、是否自带网红气质。9-10: 颜值天花板，放哪里都是焦点；7-8: 很好看；5-6: 中规中矩；3-4: 普通；1-2: 不太好看；0: 毫无观赏价值。"
    # 可拆分为：「叶形」「株型」「颜色」「开花」等子维度

  - name: 耐阴性
    factor: 6
    desc: "对低光环境的容忍度——北向房间、离窗户远的位置能否存活。9-10: 几乎无光也能活；7-8: 散射光即可；5-6: 需要明亮散射光；3-4: 需要一定直射光；1-2: 必须强光；0: 没有阳光就死。"
    # 如果用户家有南向大窗/阳台，可换成「耐晒」「抗强光」

  - name: 宠物安全
    factor: 6
    desc: "对猫狗是否有毒——是否含有草酸钙、皂苷等宠物有害物质。9-10: 完全无毒，猫狗啃了没事；7-8: 基本安全；5-6: 轻微刺激但无毒；3-4: 对宠物有毒（呕吐腹泻）；1-2: 对宠物剧毒；0: 宠物吃了会致命。"
    # 用户有猫狗时因子必须提到 8-10，甚至直接淘汰有毒植物

  - name: 空气净化
    factor: 4
    desc: "NASA/科学研究证实的有害物质去除能力——甲醛、苯、三氯乙烯等。9-10: 被多项研究证实的净化强者；7-8: 有明确净化效果；5-6: 有一定效果；3-4: 效果微弱；1-2: 基本没有；0: 无净化能力。"
    # 用户对空气质量敏感时因子提到 6-8

  - name: 价格
    factor: 4
    desc: "常见规格的购买价格。9-10: ¥20 以内一盆；7-8: ¥20-50；5-6: ¥50-150；3-4: ¥150-500；1-2: ¥500+；0: 普通家庭舍不得买。"
    # 预算敏感时因子调高；追求稀有植物时删除此维度

  - name: 生长速度
    factor: 2
    desc: "生长快慢——快意味着成就感但需要更多修剪换盆，慢意味着省心但变化小。9-10: 快慢适中，有生长感又不累；7-8: 偏快或偏慢但可接受；5-6: 太快要频繁换盆，或太慢看不到变化；3-4: 疯长收拾不过来，或几乎不长；1-2: 极快/极慢让人焦虑；0: 完全不长。"
    # 用户想快速看到效果→调高因子并偏好评「快」；省心为主→删除此维度
