# laptop.score.yml — laptop selection
# == Notes for Agents ==
# Scenario: buying a laptop for work, study, or personal use.
# Ask: primary use (coding, design, office, gaming)? OS preference? portability vs power?
# x-cmd: x env use <tool> for dev environment; x score compute for ranking

title: "Laptop Selection"
dimensions:
  - name: performance
    factor: 9
    desc: "Speed for YOUR actual workload — compile times, render speeds, multitasking, not benchmarks. 9-10: effortlessly handles everything you throw at it, zero lag; 7-8: smooth for your workflow; 5-6: adequate, occasional slowdowns; 3-4: struggles with your normal workload; 1-2: frustratingly slow; 0: can't run the software you need."
  - name: portability
    factor: 7
    desc: "Weight, size, battery life for how you actually move — commute, travel, couch, meetings. 9-10: forget it's in your bag, all-day battery, charges via USB-C; 7-8: easy to carry, good battery; 5-6: manageable weight, okay battery; 3-4: heavy or poor battery life; 1-2: desktop replacement — barely portable; 0: needs to be plugged in at all times."
  - name: build-quality
    factor: 6
    desc: "Materials, keyboard feel, trackpad, screen quality, hinge durability. 9-10: premium build — great keyboard, bright screen, solid hinge, feels expensive; 7-8: well-built; 5-6: decent for the price; 3-4: feels cheap, flexy keyboard, dim screen; 1-2: poorly built — will break; 0: falling apart out of the box."
  - name: os-ecosystem
    factor: 5
    desc: "Operating system fit for your workflow — some tools only work on specific OS. 9-10: native support for all your tools, OS you're most productive on; 7-8: works well, minor compatibility issues; 5-6: can work with VMs or workarounds; 3-4: key tools don't run natively; 1-2: fighting the OS daily; 0: can't do your job on this OS."
  - name: price-value
    factor: 5
    desc: "Price relative to specs, build, and longevity. 9-10: excellent value — premium experience at reasonable price; 7-8: good value; 5-6: fair price; 3-4: overpriced for what you get; 1-2: paying mostly for the logo; 0: absurdly overpriced."
