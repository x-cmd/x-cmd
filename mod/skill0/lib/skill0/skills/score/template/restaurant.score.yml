# restaurant.score.yml — restaurant selection

# == Notes for Agents ==
# Scenario: picking a restaurant — for a date, group dinner, celebration, or just lunch.
# One of the most frequent micro-decisions people make. Great demo template.
#
# Before scoring, ask:
#   - Occasion? (casual, date, business, celebration, solo?)
#   - Cuisine preference? (Chinese, Japanese, Western, etc.)
#   - Group size? Dietary restrictions?
#   - Budget per person?
#   - Area/neighborhood?
#
# Block column: set block = "no vegetarian options" or "fully booked" for deal-breakers.

title: "Restaurant Selection Scoring"
dimensions:
  - name: food-quality
    factor: 10
    desc: "Raw food quality — taste, ingredient freshness, execution. Independent of price. 9-10: exceptional, memorable dishes; 7-8: very good, consistently satisfying; 5-6: decent, nothing wrong but nothing special; 3-4: mediocre, wouldn't return; 1-2: bad, regret ordering; 0: inedible."
  - name: value
    factor: 6
    desc: "Quality-to-price ratio — is it worth what you pay. 9-10: surprisingly affordable for the quality; 7-8: fair price, good value; 5-6: average value; 3-4: overpriced for what you get; 1-2: expensive and bad; 0: robbery."
  - name: atmosphere
    factor: 8
    desc: "Ambiance, decor, noise level, lighting — does it fit the occasion. 9-10: perfect vibe for the occasion, comfortable noise level; 7-8: pleasant atmosphere; 5-6: fine, nothing notable; 3-4: too loud / too quiet / uncomfortable; 1-2: ruins the mood; 0: unpleasant to be in."
  - name: service
    factor: 6
    desc: "Staff attentiveness, speed, knowledge, friendliness. 9-10: exceptional service, anticipating needs; 7-8: good, responsive; 5-6: adequate; 3-4: slow or inattentive; 1-2: rude or incompetent; 0: actively hostile."
  - name: convenience
    factor: 4
    desc: "Location, parking, reservation ease, wait time. 9-10: easy to get to, easy to book, no wait; 7-8: minor hassle; 5-6: requires planning; 3-4: inconvenient location or long waits; 1-2: major hassle to visit; 0: impossible to access."
  - name: dietary-options
    factor: 4
    desc: "Flexibility for dietary needs — vegetarian, gluten-free, allergies, halal. 9-10: clearly labeled menu, easily accommodates all common diets; 7-8: good variety across diets; 5-6: limited options for some diets; 3-4: one dietary group basically can't eat here; 1-2: hostile to dietary needs; 0: dangerous for people with allergies."
