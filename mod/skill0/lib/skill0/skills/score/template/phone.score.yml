# phone.score.yml — smartphone selection
# == Notes for Agents ==
# Scenario: buying a new phone. Everyone does this every 2-4 years.
# Ask: iPhone or Android ecosystem? budget? camera important? battery life? size preference?
# x-cmd: x score compute to rank candidates

title: "Smartphone Selection"
dimensions:
  - name: budget-fit
    factor: 9
    desc: "Price vs what you're willing to spend — including case, screen protector, taxes. 9-10: comfortably within budget, feels like good value; 7-8: within budget; 5-6: slightly over but justifiable; 3-4: stretching, need to justify to yourself; 1-2: significantly over budget; 0: financially irresponsible for a phone."
  - name: battery
    factor: 8
    desc: "Real-world battery life for YOUR usage — not lab tests. 9-10: easily 1.5-2 days, never think about charging; 7-8: full day heavy use, charge at night; 5-6: makes it to evening with moderate use; 3-4: needs mid-day charging; 1-2: battery anxiety by 3pm; 0: dies before lunch."
  - name: camera
    factor: 6
    desc: "Photo quality for how YOU use it — portraits, low light, video, selfies. 9-10: stunning photos, people ask what phone you have; 7-8: very good, reliable in most conditions; 5-6: decent, good enough for social media; 3-4: noticeable limitations; 1-2: bad photos, embarrassing; 0: unusable camera."
  - name: ecosystem
    factor: 5
    desc: "Does it work with your other devices — watch, laptop, earbuds, smart home. 9-10: seamless integration, everything just works together; 7-8: good compatibility; 5-6: works but with friction; 3-4: ecosystem mismatch — can't use key accessories; 1-2: isolated device, nothing connects; 0: actively incompatible with your other gear."
  - name: longevity
    factor: 5
    desc: "Software updates, build quality, battery degradation over 3-4 years. 9-10: 5+ years of updates, still feels fast in year 3; 7-8: solid 3-4 year device; 5-6: 2-3 years before slowdown; 3-4: noticeably slow after 18 months; 1-2: obsolete within a year; 0: planned obsolescence at its worst."
