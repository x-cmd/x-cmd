# tool.score.yml — tool / platform comparison
title: "Tool Selection Scoring"
dimensions:
  - name: need-match
    factor: 8
    desc: "Whether the tool directly addresses the pain point without feature bloat or gaps. 9-10: precisely matches pain point, no feature bloat; 7-8: mostly matches; 5-6: works but has large unused feature sets; 3-4: requires heavy configuration/workarounds; 1-2: meets few requirements; 0: doesn't solve the problem."
  - name: usability
    factor: 6
    desc: "Onboarding difficulty, daily operation efficiency, learning curve for new members. 9-10: works out of the box, intuitive operation; 7-8: fairly easy to pick up; 5-6: needs learning but manageable; 3-4: steep learning curve; 1-2: complex and tedious; 0: nearly unusable."
  - name: integration
    factor: 6
    desc: "Ability to connect with the existing toolchain — API, webhooks, native integrations. 9-10: seamless connections with existing stack; 7-8: most integrations available; 5-6: some integrations need custom work; 3-4: weak integration capability; 1-2: nearly closed; 0: cannot integrate."
  - name: pricing
    factor: 6
    desc: "Pricing fit with team size and budget, transparency of hidden costs. 9-10: excellent value, transparent pricing with no hidden fees; 7-8: reasonably priced; 5-6: slightly expensive but acceptable; 3-4: clearly over budget or many hidden fees; 1-2: severely over budget; 0: unsustainable pricing."
  - name: reliability-support
    factor: 4
    desc: "Service stability, SLA, support response quality. 9-10: enterprise-grade reliability, fast support; 7-8: stable and reliable; 5-6: occasional issues, resolvable; 3-4: stability concerns; 1-2: frequent outages; 0: unreliable."
