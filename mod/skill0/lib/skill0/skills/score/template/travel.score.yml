# travel.score.yml — travel destination selection

# == Notes for Agents ==
# Scenario: choosing a travel destination. Fun and relatable — good template
# to demonstrate the score framework to new users.
#
# Before scoring, ask:
#   - Season/dates? (peak vs off-peak, weather)
#   - Travel style? (adventure, relaxation, cultural, foodie, family?)
#   - Budget? (backpacker, mid-range, luxury?)
#   - Solo, couple, family with kids, or group?
#   - Passport/visa constraints?

title: "Travel Destination Selection Scoring"
dimensions:
  - name: budget-match
    factor: 8
    desc: "Total trip cost vs budget — flights, accommodation, food, activities, visa. 9-10: well under budget, great value; 7-8: within budget; 5-6: budget-maxing; 3-4: slightly over budget; 1-2: significantly over budget; 0: completely unaffordable."
  - name: experience
    factor: 8
    desc: "What you'll actually do — sights, food, culture, nature, activities that match your travel style. 9-10: bucket-list level, exactly the experience you want; 7-8: excellent, plenty to do; 5-6: good but some gaps; 3-4: limited appeal for your interests; 1-2: boring or mismatched; 0: nothing you'd enjoy."
  - name: safety
    factor: 6
    desc: "Personal safety, political stability, health risks, solo-traveler friendliness. 9-10: extremely safe, well-traveled route; 7-8: safe with normal precautions; 5-6: some areas to avoid but generally fine; 3-4: elevated risk, travel advisory; 1-2: active conflict or high crime; 0: do not travel advisory."
  - name: convenience
    factor: 4
    desc: "Ease of getting there and around — direct flights, visa-free, language, transport. 9-10: direct flight, visa-free, English widely spoken; 7-8: easy with minor hurdles; 5-6: requires planning; 3-4: visa hassle or difficult connections; 1-2: multiple legs, complex visa; 0: nearly impossible to reach."
  - name: weather
    factor: 4
    desc: "Expected weather during travel dates — temperature, rain, seasonality. 9-10: perfect season, ideal weather; 7-8: good weather with minor issues; 5-6: mixed — some rain or heat but workable; 3-4: monsoon/typhoon season or extreme temperatures; 1-2: dangerous weather conditions likely; 0: uninhabitable during travel dates."
  - name: crowd-level
    factor: 2
    desc: "How crowded it will be — overtourism, queues, difficulty booking. 9-10: off-the-beaten-path, peaceful; 7-8: manageable crowds; 5-6: busy but not overwhelming; 3-4: packed tourist traps, long queues; 1-2: shoulder-to-shoulder everywhere; 0: completely overrun."
