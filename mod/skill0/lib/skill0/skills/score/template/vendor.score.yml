# vendor.score.yml — vendor / service provider comparison
title: "Vendor Selection Scoring"
dimensions:
  - name: service-fit
    factor: 8
    desc: "Whether the vendor's core capabilities match the requirements without excessive bundling. 9-10: core capabilities precisely aligned with needs; 7-8: good match; 5-6: partial match with bloat; 3-4: barely covers, key gaps; 1-2: capability-need mismatch; 0: completely wrong fit."
  - name: trust-reputation
    factor: 8
    desc: "Industry reputation, customer case studies, security compliance, SLA commitments. 9-10: industry benchmark, extensive positive cases, full compliance; 7-8: strong reputation; 5-6: moderate trust; 3-4: reputation under question; 1-2: many negative reviews; 0: untrustworthy."
  - name: cost-transparency
    factor: 6
    desc: "Whether pricing is transparent and predictable, with no hidden fees or lock-in clauses. 9-10: fully transparent, predictable, no lock-in; 7-8: mostly transparent; 5-6: some costs need clarification; 3-4: complex pricing, easy to exceed budget; 1-2: many hidden fees; 0: deceptive pricing."
  - name: migration-cost
    factor: 4
    desc: "Ease of migrating data and processes if switching vendors in the future. 9-10: standardized interfaces, free data export, low migration cost; 7-8: migratable, cost manageable; 5-6: requires investment but not fatal; 3-4: complex and expensive migration; 1-2: deep vendor lock-in, extremely hard to migrate; 0: total lock-in."
  - name: service-quality
    factor: 6
    desc: "Day-to-day service quality, ticket response speed, issue resolution effectiveness. 9-10: rapid response, efficient resolution; 7-8: good service quality; 5-6: acceptable; 3-4: slow response or inconsistent quality; 1-2: poor support, low resolution rate; 0: no effective support."
