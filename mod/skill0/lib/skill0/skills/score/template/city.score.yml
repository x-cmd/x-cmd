# city.score.yml — city selection for living and working

# == Notes for Agents ==
# Scenario: choosing which city to move to for work and life. A rare but massive decision —
# it determines your career opportunities, social circle, cost of living, and lifestyle
# for years. People usually make this decision on gut feel or one job offer.
#
# Ask: industry/career? remote or onsite? family situation? climate preference?
# language/culture? budget? visa/citizenship constraints?

title: "City Selection for Living & Working"
dimensions:
  - name: career-opportunity
    factor: 10
    desc: "Job market for YOUR field — not just current openings but ecosystem depth. If you lose your job, can you find another without moving again. 9-10: global hub for your industry, endless opportunities; 7-8: strong market, good options; 5-6: decent but limited; 3-4: few employers in your field; 1-2: one company town — if that job goes, you go; 0: no jobs in your field."
  - name: cost-vs-income
    factor: 9
    desc: "Salary levels vs cost of living — a high salary in an expensive city can be worse than a moderate salary in an affordable one. 9-10: high income potential with reasonable costs — actually saving money; 7-8: comfortable, saving each month; 5-6: break-even, not really building wealth; 3-4: lifestyle downgrade despite decent salary; 1-2: working to pay rent; 0: can't afford basic living on local wages."
  - name: daily-life
    factor: 7
    desc: "Commute, food, weather, walkability, green space — the texture of everyday existence. 9-10: genuinely enjoyable daily life — pleasant commute, great food, parks, weather you like; 7-8: good quality of daily life; 5-6: acceptable, nothing special; 3-4: daily frustrations — brutal commute, bad weather, concrete jungle; 1-2: daily misery; 0: unlivable for you."
  - name: social-fit
    factor: 6
    desc: "Can you build a meaningful social life — friends, dating, community, language. Moving to a city where you know nobody is hard. 9-10: easy to meet like-minded people, active social scenes matching your interests; 7-8: can build a social circle with effort; 5-6: possible but challenging; 3-4: hard to connect — cultural/language barrier, transient population; 1-2: isolated, lonely; 0: hostile to outsiders."
  - name: long-term-viability
    factor: 6
    desc: "Can you see yourself here in 10 years — settling down, citizenship/visa path, raising kids, buying property. 9-10: clear path to permanent settlement, all life stages possible here; 7-8: viable long-term; 5-6: medium-term (3-5 years) then reassess; 3-4: temporary — visa expires, market too expensive to settle; 1-2: explicitly temporary, counting down; 0: can't stay even if you wanted to."
  - name: safety-health
    factor: 5
    desc: "Personal safety, air quality, healthcare access — things you take for granted until they're gone. 9-10: extremely safe, clean air, excellent healthcare; 7-8: safe, decent healthcare; 5-6: manageable risks; 3-4: noticeable safety concerns or pollution; 1-2: genuinely dangerous or unhealthy; 0: hazardous to your health or safety."
