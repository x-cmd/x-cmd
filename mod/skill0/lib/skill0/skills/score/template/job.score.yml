# job.score.yml — job / offer selection

# == Notes for Agents ==
# Scenario: choosing between job offers — one of the hardest personal decisions
# because it mixes money, growth, culture, and lifestyle.
#
# Before scoring, ask:
#   - Career stage? (early = growth matters more; late = stability + compensation)
#   - Industry? (tech/finance/startup/enterprise have different norms)
#   - Remote/hybrid/onsite preference?
#   - Relocation involved?
#   - Competing offers? (deadline pressure)
#
# Block column: set block = "visa not sponsored" or "non-negotiable red flag" for deal-breakers.

title: "Job Offer Selection Scoring"
dimensions:
  - name: compensation
    factor: 8
    desc: "Total package: base + bonus + equity + benefits + signing. Normalize to annual. 9-10: significantly above market for your level; 7-8: at or slightly above market; 5-6: market rate; 3-4: below market; 1-2: well below market; 0: exploitative."
  - name: growth-potential
    factor: 8
    desc: "Learning, promotion path, mentorship, resume value — where will this take you in 3 years. 9-10: clear fast-track to next level with strong mentorship; 7-8: good growth opportunities; 5-6: steady but slow growth; 3-4: limited learning or dead-end role; 1-2: skill atrophy risk; 0: career setback."
  - name: ai-replaceability
    factor: 8
    desc: "How likely the core job functions will be automated or replaced by AI in 5-10 years. 9-10: AI-augmented role — AI makes you more valuable, not redundant; 7-8: resilient to automation, human judgment required; 5-6: some tasks automatable but core remains; 3-4: significant portion automatable; 1-2: high risk of replacement; 0: already being replaced — the role exists only because automation hasn't arrived yet."
    # 越早入行的岗位、重复性越高的岗位、越依赖文本/代码生成的岗位 — AI 替代风险越高。
    # 需要物理交互、复杂人际判断、创造性决策的岗位 — 风险低。
  - name: culture-wlb
    factor: 7
    desc: "Work-life balance, team culture, manager quality, psychological safety. 9-10: healthy culture, respect boundaries, strong manager; 7-8: generally good with minor issues; 5-6: mixed — some red flags but workable; 3-4: known crunch culture or toxic team; 1-2: burnout factory; 0: hostile environment."
  - name: location-commute
    factor: 5
    desc: "Where you'll work — remote flexibility, commute, city desirability. 9-10: fully remote or dream commute with flexible hours; 7-8: good location, manageable commute; 5-6: acceptable; 3-4: long commute or undesirable location; 1-2: relocation to a place you'd hate; 0: requires giving up your entire life."
  - name: stability
    factor: 5
    desc: "Company financial health, layoff history, runway, industry stability. 9-10: profitable and growing, excellent job security; 7-8: stable company with solid footing; 5-6: some risk but manageable; 3-4: startup with uncertain runway or company in decline; 1-2: high layoff risk; 0: company likely won't exist in 12 months."
