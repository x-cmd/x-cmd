# naming.score.yml — general naming scoring
title: "Naming Scoring"
dimensions:
  - name: clarity
    factor: 8
    desc: "How clear the name's meaning is at first glance. For non-native speakers: does the first impression match the intended meaning. 9-10: instantly understood, no ambiguity; 7-8: mostly clear, needs minor context; 5-6: vague, needs explanation; 3-4: easily misunderstood; 1-2: incomprehensible; 0: misleading."
  - name: memorability
    factor: 4
    desc: "How easy to remember and recall. 9-10: unforgettable; 7-8: easy to remember; 5-6: needs repetition; 3-4: easily confused or forgotten; 1-2: very hard to remember; 0: cannot form a memory."
  - name: uniqueness
    factor: 2
    desc: "How distinct from similar names in the same space. 9-10: highly unique, no near matches; 7-8: fairly distinctive; 5-6: ordinary, not standout; 3-4: similar to multiple competitors; 1-2: nearly identical; 0: exact duplicate."
  - name: phonetic
    factor: 2
    desc: "How smooth and pleasant the name sounds when spoken aloud. 9-10: rolls off the tongue, rhythmic; 7-8: flows naturally; 5-6: acceptable, no issues; 3-4: awkward or stiff; 1-2: hard to pronounce; 0: unpronounceable."
  - name: brevity
    factor: 1
    desc: "Whether the length is right — not too long, not too short. 9-10: concise and powerful, every character counts; 7-8: fairly short; 5-6: acceptable; 3-4: on the long side; 1-2: too long; 0: excessively long."
  - name: domain-fit
    factor: 6
    desc: "How well the name fits the domain/industry conventions and style. 9-10: perfectly fits domain context; 7-8: mostly appropriate; 5-6: not out of place but not impressive; 3-4: mismatched style; 1-2: severely wrong register; 0: domain taboo."
