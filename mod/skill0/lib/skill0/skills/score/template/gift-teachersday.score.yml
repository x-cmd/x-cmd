# gift-teachersday.score.yml — Teacher's Day gift selection

# == Notes for Agents ==
# Scenario: Teacher's Day gift. Key constraint: must be appropriate —
# not too expensive (many schools have limits), not too personal,
# but still conveys genuine appreciation. Students and parents have
# different gift dynamics.

title: "Teacher's Day Gift Selection"
dimensions:
  - name: appropriateness
    factor: 10
    desc: "Is it appropriate for a teacher-student relationship — not too personal, not too expensive, not awkward. 9-10: perfectly appropriate — thoughtful, modest, respectful; 7-8: appropriate; 5-6: borderline — might be slightly too personal or pricey; 3-4: questionable — could make the teacher uncomfortable; 1-2: clearly inappropriate — too intimate, too expensive, or violates school policy; 0: could get the teacher in trouble."
  - name: sincerity
    factor: 9
    desc: "Does it feel like genuine appreciation, not obligation. Teachers can tell the difference. 9-10: deeply sincere — the card message alone would make their day, the gift feels like real gratitude; 7-8: feels genuine; 5-6: nice but generic; 3-4: feels obligatory — every student gave the same thing; 1-2: perfunctory, zero feeling; 0: feels sarcastic or disrespectful."
  - name: practicality
    factor: 6
    desc: "Will the teacher actually use or enjoy it — not add to their clutter. 9-10: genuinely useful — classroom supplies they need, a book they'll read, something that makes their teaching life easier; 7-8: useful; 5-6: neutral — neither useful nor useless; 3-4: will sit on a shelf; 1-2: adds to their clutter problem; 0: immediately thrown away."
  - name: personal-touch
    factor: 6
    desc: "Does it reflect YOUR relationship with this teacher — your class, your year, your specific experience. 9-10: uniquely personal — references something from their class, shows you paid attention all year; 7-8: has personal elements; 5-6: somewhat personalized (name on a generic gift); 3-4: completely generic; 1-2: could be from any student to any teacher; 0: feels mass-produced for Teacher's Day."
  - name: presentation
    factor: 4
    desc: "The card, the wrapping, the handover moment. The card message matters more than the gift. 9-10: heartfelt handwritten card that specifically mentions what you learned or appreciated, nicely presented; 7-8: good card, decent presentation; 5-6: standard card with standard message; 3-4: no card, just the gift; 1-2: sloppy presentation; 0: no card, no wrapping, awkward handover."
  - name: price-modesty
    factor: 5
    desc: "Price must be modest — many schools have strict policies. 9-10: perfectly modest — clearly under any policy limit, no awkwardness; 7-8: modest; 5-6: slightly on the higher side but acceptable; 3-4: noticeably expensive, might make teacher uncomfortable; 1-2: clearly over policy limit; 0: could be seen as bribery."
