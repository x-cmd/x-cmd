# naming-branding.score.yml — brand / trademark naming
title: "Brand Naming Scoring"
dimensions:
  - name: memorability
    factor: 10
    desc: "Whether consumers remember the name after one exposure. 9-10: remembered instantly, spontaneously recalled; 7-8: fairly easy to remember; 5-6: needs repeated exposure; 3-4: easily confused with other brands; 1-2: hard to form an impression; 0: impossible to remember."
  - name: emotional-resonance
    factor: 8
    desc: "Whether the name evokes positive emotions or associations. 9-10: strong positive emotion, delightful; 7-8: positive associations; 5-6: neutral, no particular feeling; 3-4: slightly negative connotation; 1-2: clearly negative; 0: repulsive."
  - name: trademark-safety
    factor: 6
    desc: "Registrability as a trademark, conflict with existing marks. 9-10: highly registrable, no near matches; 7-8: registrable, needs simple search; 5-6: some risk, needs professional search; 3-4: high similarity to existing marks; 1-2: likely rejected; 0: already registered."
  - name: intl-adaptability
    factor: 4
    desc: "Performance across languages and cultures. 9-10: globally usable, no cultural conflicts; 7-8: fine in key markets; 5-6: needs adjustment in some markets; 3-4: problematic in multiple languages; 1-2: severe cultural clash in a key market; 0: unusable across markets."
  - name: uniqueness
    factor: 6
    desc: "Distinctiveness from competitor brand names. 9-10: one of a kind in the category; 7-8: highly distinctive; 5-6: differentiated but not standout; 3-4: close to a competitor name; 1-2: confusable with multiple competitors; 0: identical to a well-known brand."
  - name: phonetic-spread
    factor: 4
    desc: "Ease of word-of-mouth transmission — easy to say, hear, and introduce. 9-10: extremely smooth, repeatable after one hearing; 7-8: easy to pronounce, spreads naturally; 5-6: acceptable, no major issues; 3-4: needs pronunciation correction; 1-2: most people mispronounce; 0: impossible to spread verbally."
  - name: domain-social
    factor: 2
    desc: "Availability of matching domain name and social media handles. 9-10: .com and major platforms all available; 7-8: .com available or good alternatives exist; 5-6: needs creative variants; 3-4: unavailable on key platforms; 1-2: mostly unavailable; 0: completely unavailable."
