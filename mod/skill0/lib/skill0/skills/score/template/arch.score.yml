# arch-strategy.score.yml — architecture strategy comparison
title: "Architecture Strategy Selection Scoring"
dimensions:
  - name: need-fit
    factor: 8
    desc: "Whether the architectural paradigm matches the business requirements' characteristics (concurrency model, data consistency, latency requirements, etc). 9-10: paradigm naturally matches business characteristics; 7-8: appropriate; 5-6: workable but not optimal; 3-4: forcing architecture to fit business; 1-2: clearly mismatched; 0: architecture contradicts requirements."
  - name: complexity-roi
    factor: 8
    desc: "Whether the introduced complexity is justified by real needs — not architecture for architecture's sake. 9-10: minimal viable architecture, just enough; 7-8: complexity is reasonable; 5-6: slight over-engineering tendency; 3-4: clearly over-engineered; 1-2: severely over-engineered; 0: architecture for the resume."
  - name: team-maintainability
    factor: 6
    desc: "Whether the team can maintain this architecture long-term — skills, headcount, cognitive load. 9-10: team capability perfectly matches architecture demands; 7-8: maintainable; 5-6: some cognitive load; 3-4: team struggles; 1-2: far beyond team capability; 0: team cannot maintain."
  - name: evolution-flexibility
    factor: 4
    desc: "Whether the architecture can adapt to business changes at low cost. 9-10: core decisions reversible, clear evolution path; 7-8: main paths can evolve; 5-6: some decisions hard to adjust; 3-4: core decisions deeply locked in; 1-2: nearly impossible to evolve; 0: throwaway architecture."
  - name: ops-cost
    factor: 4
    desc: "Day-to-day operational burden: deployment, monitoring, debugging, disaster recovery. 9-10: minimal ops, mature automation; 7-8: ops manageable; 5-6: needs dedicated personnel; 3-4: heavy ops burden; 1-2: ops nightmare; 0: inoperable."
  - name: performance-latency
    factor: 2
    desc: "Performance characteristics and latency budget under expected load. 9-10: performance characteristics perfectly match needs; 7-8: meets needs with buffer; 5-6: just meets; 3-4: has performance concerns; 1-2: definite performance issues; 0: fails performance baseline."
