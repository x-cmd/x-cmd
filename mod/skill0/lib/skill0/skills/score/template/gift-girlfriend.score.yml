# gift-girlfriend.score.yml — gift selection

# == Notes for Agents ==
# Scenario: picking a gift for someone — girlfriend, family, friend, colleague.
# The hardest part of gift-giving isn't the budget — it's knowing what they'll
# actually use and appreciate.
#
# Before scoring, ask:
#   - Who is it for? (girlfriend, parent, boss, friend?)
#   - Occasion? (birthday, anniversary, Valentine's, apology, just because?)
#   - Their interests? (hobbies, style, things they've mentioned wanting?)
#   - Budget range?
#   - Any known dislikes or things they already have?
#
# Block column: set block = "already has this" or "explicitly said they hate this".

title: "Gift Selection Scoring"
dimensions:
  - name: personal-fit
    factor: 10
    desc: "How well the gift matches THIS specific person's taste, needs, and personality. Generic gifts score low. 9-10: feels like it was chosen specifically for them — references an inside joke, a shared memory, or something they mentioned once; 7-8: clearly thought about their interests; 5-6: decent, safe choice they'll probably like; 3-4: generic, could be for anyone; 1-2: doesn't match their style at all; 0: feels like you didn't try."
  - name: surprise-delight
    factor: 8
    desc: "The emotional impact when they open it — surprise, joy, 'how did you know?!'. 9-10: genuinely surprised and visibly moved — they'll tell friends about it; 7-8: big smile, clearly happy; 5-6: pleased, polite appreciation; 3-4: mild disappointment hidden behind politeness; 1-2: confused or indifferent; 0: actively upsetting."
  - name: usability
    factor: 6
    desc: "Whether they'll actually use it — not just display it or forget it in a drawer. 9-10: used frequently, becomes part of their daily life; 7-8: used regularly; 5-6: used occasionally; 3-4: used once then forgotten; 1-2: purely decorative with no function; 0: completely useless, will be regifted or thrown away."
  - name: longevity
    factor: 5
    desc: "How long the gift lasts — consumable (weeks), durable (years), experiential (memory). 9-10: lasts for years or creates a lasting memory (experience gifts); 7-8: good lifespan; 5-6: decent but finite; 3-4: short-lived or disposable; 1-2: breaks easily or expires quickly; 0: one-time use then trash."
  - name: presentation
    factor: 4
    desc: "Wrapping, packaging, unboxing experience, the moment of reveal. 9-10: gorgeous presentation — the unboxing IS part of the gift; 7-8: nicely wrapped, good packaging; 5-6: presentable; 3-4: minimal effort, plain bag; 1-2: no wrapping or ugly packaging; 0: looks like you grabbed it from a convenience store on the way."
  - name: effort-signal
    factor: 6
    desc: "How much effort the gift communicates — not money spent, but thought and care. 9-10: clearly took time, research, or handmade effort — they can FEEL the care; 7-8: shows you put thought into it; 5-6: reasonable effort; 3-4: last-minute Amazon Prime vibes; 1-2: zero effort detectable; 0: feels like an afterthought or obligation gift."
  - name: price-fit
    factor: 4
    desc: "Whether the price is appropriate for the relationship and occasion — not too cheap, not too expensive. 9-10: perfect price point — generous but not awkward; 7-8: appropriate; 5-6: slightly off but acceptable; 3-4: noticeably too cheap or too expensive for the relationship; 1-2: makes the recipient uncomfortable; 0: insultingly cheap or inappropriately expensive."
