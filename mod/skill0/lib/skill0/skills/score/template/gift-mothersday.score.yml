# gift-mothersday.score.yml — Mother's Day gift selection

# == Notes for Agents ==
# Scenario: Mother's Day gift. Mom gifts are unique: she probably says
# "don't get me anything", values thought over price, and genuinely
# appreciates handmade and sentimental items more than expensive ones.

title: "Mother's Day Gift Selection"
dimensions:
  - name: sentimental-value
    factor: 10
    desc: "Emotional meaning — does it show you thought about HER specifically, not 'a mom'. 9-10: deeply personal and touching — handwritten letter, photo album of memories, something that makes her cry happy tears; 7-8: warm and personal; 5-6: nice but generic mom gift; 3-4: feels like an obligation gift; 1-2: zero sentiment; 0: feels cold or careless."
  - name: effort-visible
    factor: 8
    desc: "Mom can tell when you made an effort vs grabbed something last-minute. 9-10: clearly took time — handmade, planned, or deeply researched; 7-8: effort is visible; 5-6: some effort apparent; 3-4: looks like a quick purchase; 1-2: zero effort — gift card to a place she doesn't shop; 0: clearly forgot and panic-bought."
  - name: practicality
    factor: 7
    desc: "Will she actually use it. Moms hate gifts that collect dust. 9-10: something she'll use regularly and think of you each time; 7-8: useful and appreciated; 5-6: somewhat useful; 3-4: mostly decorative, limited use; 1-2: will sit in a drawer; 0: completely useless, will be regifted."
  - name: comfort
    factor: 6
    desc: "Does it make her life more comfortable, relaxing, or enjoyable. Moms deserve to be pampered. 9-10: genuinely improves her daily comfort — massage, cozy robe, spa day, something that says 'you deserve to relax'; 7-8: comfortable and soothing; 5-6: somewhat comforting; 3-4: neutral; 1-2: adds stress (high-maintenance gift); 0: makes her life harder."
  - name: presentation
    factor: 4
    desc: "Mother's Day presentation — card, wrapping, the moment. 9-10: beautiful card with a real message (not just 'Love, [name]'), nicely wrapped, maybe breakfast in bed; 7-8: good presentation; 5-6: decent; 3-4: minimal effort; 1-2: no card, no wrapping; 0: handed over in the shipping box."
  - name: price-fit
    factor: 2
    desc: "Price appropriate for your age/life-stage. Mom doesn't want you to overspend. 9-10: perfect price — thoughtful but not showy; 7-8: appropriate; 5-6: slightly off; 3-4: too cheap for your means, or worryingly expensive; 1-2: makes her worry about your finances; 0: insultingly cheap or inappropriately lavish."
