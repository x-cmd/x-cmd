# naming-x-cmd-mod.yml
# Preset starter for: naming a new x-cmd standalone module.
# Copy this file to naming.<module>.yml, fill in / crop, then audit
# with naming.okr-creator.yml.
#
# This is a SHORTER starter than naming.template.yml — it pre-fills
# the common x-cmd module constraints (length 2-6, lowercase, no
# separator, brand prior preferences). Use it when the task is
# "name a new x <modname>" and the concept is "x-cmd module".
#
# Worked example for the longer case: naming.trial-run-module.yml
# (trial-run pick = seatrial, score 8.5).

# ============================================================
# Goal
# ============================================================

goal-TBD_module-naming:
  name: Pick x-cmd module name for TBD_concept
  apply: "naming.x-cmd-mod.yml (self)"
  level: error
  desc:
  - "Concept: TBD_what the module IS and what role it plays."
  - "Must pass x-cmd brand: 2-6 letters typical, max 8, lowercase, no separator."
  - "Avoid x-cmd brand pollution: unittest testcase, military-only (livefire/liftoff), aviation-only (taxi/runway), etc."

# ============================================================
# Key Results
# ============================================================

keyresult-kr1-x-cmd-brand-pass:
  name: Pick passes x-cmd brand constraints
  apply: "naming.x-cmd-mod.yml"
  level: error
  desc:
  - "Length 2-6 typical, 8 max, lowercase only, no separator."
  - "Prior matches the concept (no multi-prior conflict)."

keyresult-kr2-anchored-score:
  name: Top pick has D1-D7 anchored score
  apply: "naming.x-cmd-mod.yml"
  level: error
  desc:
  - "Top pick in `session.scores` has anchors for every relevant D1-D7 dimension."

keyresult-kr3-backup-within-1:
  name: Backup within 1.0 of pick
  apply: "naming.x-cmd-mod.yml"
  level: warn
  desc:
  - "score(pick) - score(backup) <= 1.0."

# ============================================================
# Task-specific rules
# ============================================================
# x-cmd module defaults — crop if not applicable, add new ones
# for the specific concept.

x-cmd-mod-001:
  name: length-2-to-8-letters
  apply: "candidate x-cmd module names"
  level: error
  desc:
  - "Per x-cmd brand: 2-6 typical, max 8 letters (9+ rejected at D1)."

x-cmd-mod-002:
  name: lowercase-no-separator
  apply: "candidate x-cmd module names"
  level: error
  desc:
  - "Lowercase only. No hyphens, no underscores, no dots (the `x` comes from command structure)."

x-cmd-mod-003:
  name: no-unittest-pollution
  apply: "candidate x-cmd module names"
  level: error
  desc:
  - "Avoid names carrying unittest prior: testcase, smoketest, anything with *test/*case/*mock suffix."

x-cmd-mod-004:
  name: no-narrow-domain-only
  apply: "candidate x-cmd module names"
  level: warn
  desc:
  - "Unless concept IS the domain, avoid names bound to one narrow domain (naval-only, aviation-only, auto-only, restaurant-only, military-only)."

x-cmd-mod-005:
  name: bare-prior-must-match-concept
  apply: "candidate x-cmd module names"
  level: error
  desc:
  - "Dictionary first meaning of the bare word must match the module concept."
  - "Multi-prior with strong conflicting sense = auto-reject (D2 fail)."

# ============================================================
# Session record
# ============================================================

session:
  prefer:
    vivid: TBD_yes | no | weak
    domain_acceptable: TBD_list — narrow domains OK for this concept, e.g. [naval] or []
    length_priority: TBD_shorter | self_explanatory
    origin: TBD_english | chinese | coined
    trade_off: TBD_single_prior_ok | hit_every_dim

  init_verdicts:
    - { name: TBD_candidate, gate: TBD_init-005 | init-006 | init-007 | pass, reason: "TBD_why" }

  scores:
    - name: TBD_candidate
      score: TBD_0_to_10
      anchors:
        - "D1: TBD_letter count (5-8 ideal)"
        - "D2: TBD_dictionary first meaning"
        - "D3: TBD_compound literal / bare word sense"
        - "D4: TBD_trial vs real (if applicable)"
        - "D5: TBD_run vs test (if applicable)"
        - "D6: TBD_vividness"
        - "D7: TBD_archetype (if applicable)"
      misses:
        - "TBD_real misses"

  final:
    pick: TBD_winning_candidate
    backup: TBD_runner_up_or_null
