# naming-brand.yml
# x-cmd brand constraints as enforceable .rule entries.
# x-cmd-specific — different from naming-concept.yml (which is universal).
# Brand constraints differ per organization — modify this file for your org.
#
# REFERENCE MODULES (x-cmd modules that demonstrate brand fit):
#   good:  rule (4), hub (3), scotty (6), ccal (4), claw (4), ccmd (4)
#   avoid: abc (meaningless), pilot (multi-prior), testcase (unittest pollution),
#          smoketest (unittest vanguard)
#
# CHANGELOG:
#   2026-06-05: Initial version. Derived from trial-run naming iteration.

# ============================================================
# Module naming constraints
# ============================================================

brand-module-length:
  name: x-cmd-module-length-2-to-8
  level: error
  apply: "x-cmd module names"
  desc:
  - "Typical: 2-6 letters."
  - "Max: 8 letters (9+ rejected per D1)."
  - "Min: 2 letters (1 letter is ambiguous)."
  tldr:
  - right: "rule (4), hub (3), git (3), curl (4)"

brand-module-case:
  name: x-cmd-module-lowercase
  level: error
  apply: "x-cmd module names"
  desc:
  - "Lowercase only."

brand-module-separator:
  name: x-cmd-module-no-separator
  level: error
  apply: "x-cmd module names"
  desc:
  - "No hyphens, no underscores, no dots."
  - "The 'x' comes from command structure, not from the name."

brand-module-form-allowed:
  name: x-cmd-module-form-allowed
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Allowed forms: single word (e.g. rule, git, curl) or compound (e.g. hub, lteam, ccal)."
  - "Abbreviation acceptable if pronounceable."
  tldr:
  - right: "rule, hub, scotty, ccal, claw, ccmd"

brand-module-prefix:
  name: no-x-prefix-on-module
  level: error
  apply: "x-cmd module names"
  desc:
  - "No `x_` or `x-` prefix on the module name."
  - "The `x` comes from the command structure (`x <name>`), not from the name itself."
  tldr:
  - wrong: "x_rule, x-rule"

# ============================================================
# Subcommand naming constraints
# ============================================================

brand-subcommand-length:
  name: x-cmd-subcommand-length-2-to-12
  level: warn
  apply: "x-cmd subcommand names"
  desc:
  - "Typical 2-12 letters."
  - "Single word or hyphenated form."

brand-subcommand-case:
  name: x-cmd-subcommand-lowercase
  level: error
  apply: "x-cmd subcommand names"
  desc:
  - "Lowercase only."
  tldr:
  - wrong: "Test, RUN, RuleInfo (case violations)"

brand-subcommand-separator:
  name: x-cmd-subcommand-hyphen-ok
  level: warn
  apply: "x-cmd subcommand names"
  desc:
  - "Hyphen allowed (a-b form) for compound verbs/nouns."
  - "Underscore not preferred."
  tldr:
  - right: "test-run, rule-info, dry-check"
  - wrong: "this_is_a_long_subcommand_name (underscore)"

# ============================================================
# Prior preferences — what priors fit x-cmd modules
# ============================================================

brand-prior-domain-action-verb:
  name: prefer-domain-action-verb
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer domain action verbs (clear action)."
  tldr:
  - right: "lookup, find, scan, audit, lint, run, check"

brand-prior-domain-noun:
  name: prefer-domain-noun
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer domain nouns (clear noun)."
  tldr:
  - right: "rule, file, branch, hub, gist, repo"

brand-prior-compound-literal:
  name: prefer-compound-with-clear-literal
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer compound with clear literal."
  tldr:
  - right: "hub, scotty, claw, ccal, ccmd"

brand-prior-well-known-abbrev:
  name: prefer-well-known-abbrev
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Well-known abbreviation OK if pronounceable."
  tldr:
  - right: "git, gh, api, ssh, css"

# ============================================================
# Prior avoids — what priors DON'T fit x-cmd modules
# ============================================================

brand-avoid-unittest-pollution:
  name: avoid-unittest-pollution
  level: error
  apply: "x-cmd module names"
  desc:
  - "Avoid names carrying unittest prior."
  - "Patterns: testcase, smoke*, *test, *case."
  - "Reason: carries unittest prior — user base is dev/sysadmin, not unittest authors."
  tldr:
  - wrong: "testcase, smoketest, pilottest"

brand-avoid-military-only:
  name: avoid-military-only
  level: error
  apply: "x-cmd module names"
  desc:
  - "Avoid military-only names unless concept IS military."
  - "Patterns: livefire, liftoff, debrief, sortie."
  - "Reason: wrong domain; user base is dev/sysadmin, not military."
  tldr:
  - wrong: "livefire, liftoff, debrief, sortie"

brand-avoid-nautical-only:
  name: avoid-nautical-only-unless-concept-nautical
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid nautical-only names unless concept IS ships."
  - "Patterns: seatrial, anchor, mooring, berth."
  - "Reason: narrow domain; only OK if concept is ships."
  tldr:
  - wrong: "anchor, mooring, berth (unless concept is ships)"

brand-avoid-aviation-only:
  name: avoid-aviation-only-unless-concept-aviation
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid aviation-only names unless concept IS aircraft."
  - "Patterns: liftoff, taxi, flight, runway."
  - "Reason: narrow domain; only OK if concept is aircraft."
  tldr:
  - wrong: "taxi, flight, runway (unless concept is aircraft)"

brand-avoid-auto-only:
  name: avoid-auto-only-unless-concept-auto
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid auto-only names unless concept IS cars."
  - "Patterns: testdrive, race, drift, burnout."
  - "Reason: narrow domain; only OK if concept is cars."
  tldr:
  - wrong: "race, drift, burnout (unless concept is cars)"

brand-avoid-restaurant-only:
  name: avoid-restaurant-only-unless-concept-restaurant
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid restaurant-only names unless concept IS F&B."
  - "Patterns: softopen, softlaunch, menu, special."
  - "Reason: narrow domain; only OK if concept is F&B."
  tldr:
  - wrong: "softopen, softlaunch, menu, special (unless concept is F&B)"

brand-avoid-meaningless-abbrev:
  name: avoid-meaningless-abbreviation
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid meaningless abbreviations (3 random letters)."
  - "Reason: low self-explanatory, no prior to anchor on."
  tldr:
  - wrong: "abc (3 random letters)"

brand-avoid-multi-prior-ambiguous:
  name: avoid-multi-prior-ambiguous
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Avoid names with multiple strong priors that conflict in x-cmd context."
  - "Reason: ambiguous prior — user can't tell which sense applies."
  tldr:
  - wrong: "pilot (airplane pilot vs pilot project)"

# ============================================================
# Trade-off policy
# ============================================================

brand-tradeoff-prefer-vivid:
  name: prefer-vivid-over-abstract
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer concrete vivid over abstract (per x-cmd user signal in trial-run naming)."

brand-tradeoff-prefer-domain-agnostic:
  name: prefer-domain-agnostic
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer domain-agnostic over domain-specific (unless the domain IS the concept)."

brand-tradeoff-prefer-self-explanatory:
  name: prefer-self-explanatory
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer self-explanatory compound over single word with multi-prior."

brand-tradeoff-prefer-shorter:
  name: prefer-shorter
  level: warn
  apply: "x-cmd module names"
  desc:
  - "Prefer shorter over longer (if both hit core dimensions)."
