# naming-concept.yml
# Objective evaluation framework as enforceable .rule entries.
# Loaded by the naming skill when scoring candidates.
# All rules here are OBJECTIVE — anchored in dictionary / length / etymology / usage.
#
# SCORING ANCHORS (sum of weighted dimension hits, mapped to 0-10):
#   9.0-10.0  all dimensions hit, only minor trade-off (e.g. 1 domain-specific binding)
#   8.0-8.5   core dimensions hit (D1, D2, D4, D5), 1-2 minor misses
#   7.0-7.5   most dimensions hit, 2-3 misses but core correct
#   6.0-6.5   direction right, 3+ misses, may need user trade-off acceptance
#   < 6.0     prior conflict / concept mismatch — should be rejected
#
# DIMENSION WEIGHTS (for computing score from dimension hits):
#   D1 length                 1.0
#   D2 prior_cleanliness      2.0  (top reason to reject)
#   D3 self_explanatory       1.0
#   D4 trial_vs_real          1.5
#   D5 run_vs_test            1.5
#   D6 vividness              0.5  (preferred but not required)
#   D7 large_equipment        0.5  (skip if concept is software)
#
# CALIBRATION EXAMPLES (trial-run naming iteration, for reference):
#   seatrial (8, 8.5)   D1-D7 all hit, naval-specific the only trade-off
#   trialrun (8, 7.5)   D4/D5 ✓, D6/D7 miss (abstract, no archetype)
#   livefire (8, 6.0)   D4 fail (REAL not TRIAL)
#   shakedown (9, 5.0)  D1 fail (9 letters), D2 fail (extortion slang)
#   fieldtest (9, 3.0)  D1 fail, D4 fail (real deployment sense)
#   staticfire (10, 8.0) D2/D3/D5/D6/D7 ✓, D1 fail (10 letters)
#   pilottest (9, 5.5)  D1 fail, D5 fail (is TEST not RUN)
#   tryout (6, 7.5)     D1/D2/D4/D5 ✓, D6/D7 miss
#   canary (6, 7.5)     D1/D2/D4/D5 ✓, D6/D7 miss (software-specific)
#   pilot (5, 7.0)      D1/D2_partial/D4/D5 ✓, D2_clean/D6/D7 miss

# ============================================================
# D1-D7 evaluation dimensions (each is an enforceable rule)
# ============================================================

d1-length:
  name: length-5-to-8
  level: error
  apply: "candidate words"
  desc:
  - "Length must be 5-8 letters."
  - "9+ rejected outright (9 letters too long)."
  - "< 2 has multi-prior issues (every short word is overloaded)."
  - "Weight: 1.0"
  tldr:
  - wrong: "poc (3 letters, multi-prior) / shakedown (9 letters, too long)"

d2-prior-cleanliness:
  name: prior-matches-target
  level: error
  apply: "candidate words"
  desc:
  - "Bare word's dominant prior (dictionary first meaning) must match target concept."
  - "Multi-prior OR strong conflicting prior = auto-reject (D2 fail)."
  - "Bare word prior = dictionary first meaning, not the meaning we want."
  - "Weight: 2.0 — prior mismatch is the #1 reason to reject."
  tldr:
  - wrong: "shakedown — dictionary first = extortion/search (slang dominates)"
  - right: "seatrial — dictionary first = sea trial = 海上试航"

d3-self-explanatory:
  name: compound-literal-conveys-concept
  level: warn
  apply: "candidate compounds"
  desc:
  - "Compound literal must convey concept at first glance — no docs needed."
  - "Weight: 1.0"
  tldr:
  - wrong: "pilot — first read is airplane pilot, not pilot project"
  - right: "seatrial — sea + trial = 海上试航, no context needed"

d4-trial-vs-real:
  name: prior-is-trial-not-real
  level: error
  apply: "candidate words"
  desc:
  - "Prior must be 'trial / pre-use / before full' — NOT 'real / deployment / live / full'."
  - "Trial ≠ Real. TRIAL is the 'before full deployment' phase."
  - "Weight: 1.5"
  tldr:
  - wrong: "fieldtest — prior = real deployment in real scenario"
  - right: "seatrial — prior = 试航 = trial phase"

d5-run-vs-test:
  name: prior-is-run-not-test
  level: error
  apply: "candidate words"
  desc:
  - "Prior must be 'run / execute / use / operate' — NOT 'test / verify / prove / check'."
  - "试运行 is RUN, not TEST. 'Test' suffix is a red flag."
  - "Weight: 1.5"
  tldr:
  - wrong: "pilottest — prior = test before real test = is TEST"
  - right: "trialrun — prior = 试运行 = run"

d6-vividness:
  name: vividness-binds-concrete-scenario
  level: warn
  apply: "candidate words"
  desc:
  - "Should evoke concrete imagery (ship / plane / rocket / factory)."
  - "Vivid is preferred but not required. Ask user at preflight."
  - "Weight: 0.5"
  tldr:
  - wrong: "trialrun — two abstract words, no concrete scene"
  - right: "seatrial — 船 / 海 / 浪, vivid naval scene"

d7-large-equipment:
  name: implies-large-equipment
  level: warn
  apply: "candidate words"
  desc:
  - "Should imply large physical system (ship / plane / factory / rocket)."
  - "Skip if concept is software-only."
  - "Weight: 0.5"
  tldr:
  - wrong: "tryout — small-scale audition"
  - right: "seatrial — ship = textbook large equipment"

# ============================================================
# Red lines — auto-reject patterns (each is its own rule)
# ============================================================

red-line-test-suffix:
  name: no-test-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *test suffix carry unittest prior."
  - "is TEST, not RUN. pilottest = 'test before real test'."
  tldr:
  - wrong: "pilottest (prior = test before real test = is TEST, not RUN)"

red-line-case-suffix:
  name: no-case-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *case suffix carry unittest test-case prior."

red-line-mock-suffix:
  name: no-mock-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *mock suffix contradict 'actually runs' (fake / no real run)."

red-line-fake-suffix:
  name: no-fake-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *fake suffix = fake / no real run."

red-line-stub-suffix:
  name: no-stub-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *stub suffix = stub / placeholder / no real run."

red-line-dry-suffix:
  name: no-dry-suffix
  level: error
  apply: "candidate words"
  desc:
  - "Words with *dry suffix = 'no side effects' prior — conflicts with 'actually runs'."

red-line-smoke-prefix:
  name: no-smoke-prefix
  level: error
  apply: "candidate words"
  desc:
  - "smoke* is unittest's vanguard — wrong domain (smoketest = unit test vanguard)."

red-line-field-prefix:
  name: no-field-prefix
  level: error
  apply: "candidate words"
  desc:
  - "field* prior = real deployment — TRIAL ≠ REAL."
  - "fieldtest = 'real deployment in real scenario'."
  tldr:
  - wrong: "fieldtest (prior = real deployment)"

red-line-live-prefix:
  name: no-live-prefix
  level: error
  apply: "candidate words"
  desc:
  - "live* prior = real action — TRIAL ≠ REAL."
  - "livefire = real ammo, not trial."
  tldr:
  - wrong: "livefire (prior = real ammo, not trial)"

# ============================================================
# Anti-patterns (scoring heuristics)
# ============================================================

anti-pattern-bare-word-no-compound:
  name: bare-word-multi-prior-risk
  level: warn
  apply: "candidate single words"
  desc:
  - "Bare single words tend to have multi-prior problems (overloaded meaning)."
  - "Prefer compound (2 words) for self-explanatory names."

anti-pattern-coined-word:
  name: coined-word-low-acceptance
  level: warn
  apply: "candidate words"
  desc:
  - "Coined (made-up) words have low acceptance and weak self-explanatory."
  - "Prefer existing words over new coinages."

anti-pattern-9-plus-letters:
  name: over-length-rejected
  level: error
  apply: "candidate words"
  desc:
  - "9+ letters violates D1 (max 8 letters)."
  - "Even if concept is perfect, length alone disqualifies."
  tldr:
  - wrong: "shakedown (9), fieldtest (9), pilottest (9), staticfire (10)"
  - right: "seatrial (8), trialrun (8) — at upper bound but within"

# ============================================================
# Scoring must be anchored (process rule)
# ============================================================

scoring-anchored-in-facts:
  name: every-score-has-fact-anchor
  level: error
  apply: "scoring process"
  desc:
  - "Every score MUST be accompanied by a fact-anchor."
  - "Format: '7.5 (D2 hit: dictionary first = sea trial trial-use; D4 hit: trial-run sense)'."
  - "Score without anchor = invalid score."
  - "Subjective preferences (vivid, domain-acceptance) do NOT change scores; they break ties."
  tldr:
  - wrong: "livefire = 6.0 (user said boring)"
  - right: "livefire = 6.0 (D4 fail: real ammo, not trial; D6 hit: military vivid; 'boring' is preference, not score)"

scoring-no-subjective-inflation:
  name: scores-anchored-not-inflated
  level: error
  apply: "scoring process"
  desc:
  - "Anti-patterns for the scorer:"
  - "  - Inflate score because user reacted positively to candidate"
  - "  - Deflate score because user reacted negatively to candidate"
  - "  - Apply subjective brand preferences (org-specific) — those are in naming-brand.yml"
  - "  - Score on 'I like this word' — only on D1-D7"
  - "  - Skip dimensions silently — must mark hit / miss / partial"
