# naming.trial-run-module.yml
# Naming session record for: trial-run standalone module (Stage 1 of two-stage test).
#
# Audited by:  naming.okr-creator.yml
# Run check:   x rule check -r <naming-dir> naming.trial-run-module.yml
#
# OKR structure:
#   goal:       1 goal-* rule (the naming task)
#   keyresults: 4 keyresult-* rules (verifiable outcomes)
#   rules:      8 task-specific rules (TRIAL, RUN, length, etc.)
#   session:    audit trail on the goal rule (prefer / init_verdicts / scores / final)

# ============================================================
# Goal
# ============================================================

goal-trial-run-naming:
  name: Pick standalone x-cmd module name for trial-run
  apply: "naming.trial-run-module.yml (self)"
  level: error
  desc:
  - "Pick a module name for the trial-run module that scores 8.0+ on D1-D7."
  - "Self-explanatory at first glance, survives all red-line / dictionary / length fast-fails."
  - "Concept: trial-run = real run in trial phase, with traceable record. Large equipment in trial use."

# ============================================================
# Key Results (verifiable outcomes)
# ============================================================

keyresult-kr1-top-pick-committed:
  name: Top pick committed with anchored score
  apply: "naming.trial-run-module.yml"
  level: error
  desc:
  - "Top pick is recorded in `session.scores` with D1-D7 anchors."
  - "Top pick is declared in `session.final.pick`."

keyresult-kr2-backup-documented:
  name: Backup candidate documented within 1.0 of pick
  apply: "naming.trial-run-module.yml"
  level: error
  desc:
  - "Backup candidate is recorded in `session.scores` with anchors."
  - "Backup is declared in `session.final.backup`."
  - "Score gap between pick and backup is <= 1.0."

keyresult-kr3-no-low-scores-in-final:
  name: No candidate below 6.0 in final short-list
  apply: "naming.trial-run-module.yml"
  level: error
  desc:
  - "All `session.scores` entries are >= 6.0."
  - "Lower-scoring candidates were rejected at init (recorded in `session.init_verdicts`), not in final."

keyresult-kr4-all-scores-anchored:
  name: Every score has a fact-anchor
  apply: "naming.trial-run-module.yml"
  level: error
  desc:
  - "Every entry in `session.scores` has a non-empty `anchors` list."
  - "No bare numbers — every score is anchored in D1-D7 evidence."

# ============================================================
# Task-specific rules
# ============================================================
# These are the constraints this naming task enforces on candidates.
# They supplement naming.init.yml (generic fast-fails).

trial-run-001:
  name: must-be-TRIAL-not-REAL
  apply: "candidate words for trial-run module"
  level: error
  desc:
  - "Word prior must be 'trial / pre-use / before full deployment' — NOT 'real / deployment / live'."
  - "fieldtest / livefire / staticfire all fail (REAL not TRIAL)."
  tldr:
  - wrong: "fieldtest (9 letters, prior = real deployment in real scenario)"
  - right: "seatrial (8 letters, prior = sea trial = 试航)"

trial-run-002:
  name: must-be-RUN-not-TEST
  apply: "candidate words for trial-run module"
  level: error
  desc:
  - "Word prior must be 'run / execute / use / operate' — NOT 'test / verify / prove / check'."
  - "试运行 is RUN, not TEST. Adding 'test' suffix = 'test before real test' = is TEST, dies on D5."
  - "pilottest / smoketest / dryrun all fail."
  tldr:
  - wrong: "pilottest (9 letters, prior = test before realtest = is TEST)"
  - right: "trialrun (8 letters, prior = 试运行 = run)"

trial-run-003:
  name: must-imply-large-equipment
  apply: "candidate words for trial-run module"
  level: warn
  desc:
  - "Concept = 大型装备在试用 — name should bind to a 'large equipment' archetype."
  - "Strong: ship (sea), plane (aviation), rocket (space), factory (industrial)."
  - "Weak / wrong: audition, smoke, software-only."

trial-run-004:
  name: length-5-to-8-letters
  apply: "candidate words for trial-run module"
  level: error
  desc:
  - "5-8 letters per D1. 9+ rejected at init (init-007)."
  - "Compound of 8 letters is the sweet spot for this module."

trial-run-005:
  name: must-be-self-explanatory
  apply: "candidate compounds for trial-run module"
  level: error
  desc:
  - "Compound literal must convey concept at first glance — no docs required."
  - "sea + trial = 海上试航 (self-explanatory)."
  - "trial + run = 试运行 (self-explanatory)."

trial-run-006:
  name: bare-prior-must-match-intent
  apply: "candidate words for trial-run module"
  level: error
  desc:
  - "The bare word's dominant prior (dictionary first meaning) must match 'trial run'."
  - "Multi-prior with strong conflicting sense = auto-reject (D2 fail)."
  - "Word prior is a property of the word itself — it persists regardless of design intent."
  - "Examples that DIED: shakedown (extortion/search slang dominates)."

trial-run-007:
  name: prefer-vivid-with-concrete-scenario
  apply: "candidate words for trial-run module"
  level: warn
  desc:
  - "Vivid = binds to concrete scenario (sea / sky / factory / stage)."
  - "User signal: '希望 词 看起来 不言自明' — vivid is a real signal here."
  - "When two candidates tie on core dims, vivid wins."

trial-run-008:
  name: naval-specific-binding-acceptable
  apply: "candidate words for trial-run module"
  level: warn
  desc:
  - "Naval binding (ship, sea, voyage) is ACCEPTABLE for this module."
  - "Ship is the textbook large equipment archetype."
  - "User explicitly OK'd 'naval OK' at init preflight."

# ============================================================
# Session record (audit trail)
# ============================================================
# Stored on the goal rule as `session:`. Audited by naming.okr-creator.yml.
# `session:` is a non-standard field — lint flags it as warn-level "unknown
# field" (check_090), which is acceptable. The OKR-creator rule knows about it.

session:
  prefer:
    vivid: yes
    domain_acceptable: [naval]
    length_priority: self_explanatory
    origin: english
    trade_off: single_prior_ok

  init_verdicts:
    - { name: fieldtest,  gate: init-007, reason: "9 letters > 8" }
    - { name: shakedown,  gate: init-006, reason: "dictionary first meaning = extortion / search (slang dominates)" }
    - { name: smoketest,  gate: init-005, reason: "smoke* red line (unittest vanguard)" }
    - { name: livefire,   gate: init-005, reason: "live* red line (real action, not trial)" }
    - { name: pilottest,  gate: init-007, reason: "9 letters; prior = 'test before real test' = is TEST, not RUN" }
    - { name: dryrun,     gate: init-005, reason: "*dry red line (no side effects, conflicts with 'actually runs')" }
    - { name: staticfire, gate: init-007, reason: "10 letters" }
    - { name: hotfire,    gate: pass }
    - { name: tryout,     gate: pass }
    - { name: canary,     gate: pass }
    - { name: seatrial,   gate: pass }
    - { name: trialrun,   gate: pass }

  scores:
    - name: seatrial
      score: 8.5
      anchors:
        - "D1: 8 letters"
        - "D2: dictionary first = sea trial = 海上试航, single dominant prior"
        - "D3: literal sea+trial = 海上试航, self-explanatory at first glance"
        - "D4: 试航 = trial, TRIAL ✓"
        - "D5: 试航 = run, RUN ✓"
        - "D6: 船 / 海 / 浪 / 试航报告 — concrete scene, vivid"
        - "D7: ship = textbook large equipment archetype"
      misses:
        - "D6 / D7: naval-specific binding (user OK'd at preflight; treat as feature)"

    - name: trialrun
      score: 7.5
      anchors:
        - "D1: 8 letters"
        - "D2: dictionary first = trial run = 试运行, single dominant prior"
        - "D3: literal trial+run = 试运行, self-explanatory at first glance"
        - "D4: 试用 = trial, TRIAL ✓"
        - "D5: 运行 = run, RUN ✓"
      misses:
        - "D6: two abstract words, no concrete scene"
        - "D7: no large-equipment archetype (缺装备层)"

    - name: hotfire
      score: 7.5
      anchors:
        - "D1: 7 letters"
        - "D2: dictionary first = engine hot fire test"
        - "D3: hot+fire = 引擎热试车, self-explanatory"
        - "D5: 热试车 = run, RUN ✓"
        - "D6: 火箭引擎地面试车 — vivid"
        - "D7: 引擎 / 火箭 = large equipment"
      misses:
        - "D4: 热试车 is more 'real test' than 'trial' (REAL-leaning, not pure TRIAL)"

    - name: tryout
      score: 7.5
      anchors:
        - "D1: 6 letters"
        - "D2: dictionary first = 选拔赛 / 试镜"
        - "D3: try+out = 试镜, self-explanatory"
        - "D4: 试镜 = trial, TRIAL ✓"
        - "D5: 试镜 = run, RUN ✓"
      misses:
        - "D6: 试镜 = small-scale, no concrete large-equipment scene"
        - "D7: 试镜 = audition, not large equipment"

    - name: canary
      score: 7.5
      anchors:
        - "D1: 6 letters"
        - "D2: dictionary first = canary deployment"
        - "D3: canary = 金丝雀 (canary in coal mine)"
        - "D4: canary deployment = trial (small release), TRIAL ✓"
        - "D5: canary deployment = run, RUN ✓"
      misses:
        - "D6: software-specific, not physical"
        - "D7: software deployment, not large equipment"

  final:
    pick: seatrial
    backup: trialrun
