# naming.score-module.yml
# Naming session record for: x-cmd score module (weighted dimension scoring).
#
# Audited by:  naming.okr-creator.yml
# Run check:   x rule check -r <naming-dir> naming.score-module.yml
#
# OKR structure:
#   goal:       1 goal-* rule (the naming task)
#   keyresults: 3 keyresult-* rules (verifiable outcomes)
#   rules:      6 task-specific rules (4-layer D2, time-mode, PROMO, etc.)
#   session:    audit trail on the goal rule (prefer / init_verdicts / scores / final)

# ============================================================
# Goal
# ============================================================

goal-score-module-naming:
  name: "Pick x-cmd module name for weighted dimension scoring: score weight multiply dimensional rating = total"
  apply: "naming.score-module.yml (self)"
  level: error
  desc:
  - "Pick a module name for the score module — 5-6 letters, batch (not real-time), universally familiar, sloganeable."
  - "Concept: a framework for AI to compute weighted scores from per-dimension hits. Not grading, not judging — weighted arithmetic."

# ============================================================
# Key Results (verifiable outcomes)
# ============================================================

keyresult-kr1-top-pick-committed:
  name: Top pick committed with anchored scores
  apply: "naming.score-module.yml"
  level: error
  desc:
  - "Top pick is recorded in `session.scores` with dimension anchors."
  - "Top pick is declared in `session.final.pick`."

keyresult-kr2-all-scores-anchored:
  name: Every score has a fact-anchor
  apply: "naming.score-module.yml"
  level: error
  desc:
  - "Every entry in `session.scores` has a non-empty `anchors` list."
  - "No bare numbers."

keyresult-kr3-promotion-verified:
  name: Top pick promotion-verified
  apply: "naming.score-module.yml"
  level: error
  desc:
  - "Top pick has a slogan in the standard pattern: 'A framework for AI to <verb> the <object>'."
  - "Slogan passes all 5 PROMO sub-factors: catchy, memorable, spreadable, accessible, 大家熟悉."

# ============================================================
# Task-specific rules
# ============================================================

score-module-001:
  name: 4-layer-D2-gate
  apply: "candidate module names"
  level: error
  desc:
  - "Candidate must pass at least 3 of 4 context layers (dictionary/CLI/slogan/software)."
  - "Software/Domain 1st off-target is a hard fail (e.g. metric→observability, panel→UI panel, rank→search)."
  - "Dictionary 1st off-target is acceptable if CLI/slogan/software all on (e.g. score→sports off, CLI on)."

score-module-002:
  name: batch-time-mode
  apply: "candidate module names"
  level: error
  desc:
  - "Candidate must imply batch/cumulative computation, not real-time continuous reading."
  - "gauge (real-time dashboard), umpire (real-time during game), verdict (decision point) fail."
  - "score, grade, tally (count up) all batch."

score-module-003:
  name: universal-familiarity
  apply: "candidate module names"
  level: error
  desc:
  - "Candidate must be known to non-native English readers without lookup."
  - "大家熟悉 is a hard gate. tally (non-native 'tally 我不懂'), rubric (academic, not universal), arbiter (literary) fail."
  - "score, grade, mark pass."

score-module-004:
  name: promotional-slogan
  apply: "candidate module names"
  level: warn
  desc:
  - "Slogan in 'A framework for AI to <verb> the <object>' pattern must be promotable."
  - "5 sub-factors: catchy (hook), memorable (short), spreadable (repeatable), accessible (no lookup), familiar (大家熟悉)."
  - "score 'A framework for AI to score the result' — gold standard, user's own example."

score-module-005:
  name: x-cmd-brand-noun
  apply: "candidate module names"
  level: warn
  desc:
  - "x-cmd modules are nouns (rule, hub, scotty). Verb-form names (assess) are slightly off-brand."
  - "score is noun ✓, grade is noun ✓, tally is noun ✓."

score-module-006:
  name: prioritize-slogan-naturalness-over-rest
  apply: "candidate module names"
  level: warn
  desc:
  - "When the obvious name is good enough, don't over-iterate the framework."
  - "score was the first natural pick; time spent rejecting then re-confirming it was circular."

# ============================================================
# Session record (audit trail)
# ============================================================

session:
  prefer:
    vivid: weak
    domain_acceptable: []
    length_priority: shorter
    origin: english
    trade_off: single_prior_ok

  init_verdicts:
    - { name: marks,    gate: init-005, reason: "plural violates brand (lowercase single word)" }
    - { name: verdict,  gate: init-006, reason: "dictionary 1st = legal binary decision, concept is gradient" }
    - { name: value,    gate: init-006, reason: "dictionary 1st = monetary value, not scoring" }
    - { name: worth,    gate: init-006, reason: "dictionary 1st = monetary worth, not scoring" }
    - { name: metric,   gate: init-005, reason: "software 1st = observability (Prometheus/Grafana metric collision)" }
    - { name: gauge,    gate: init-008, reason: "time-mode = real-time dashboard, concept is batch" }
    - { name: panel,    gate: init-005, reason: "CLI 1st = UI panel, software domain collision" }
    - { name: rubric,   gate: init-006, reason: "dictionary 1st = heading on document; non-native 1st off-target" }
    - { name: rank,     gate: init-005, reason: "software 1st = search engine collision (PageRank)" }
    - { name: umpire,   gate: init-005, reason: "software 1st = sports domain, CLI 1st domain mismatch" }
    - { name: arbiter,  gate: init-005, reason: "software 1st = dispute resolution, not scoring" }
    - { name: critic,   gate: init-005, reason: "software 1st = negative critic, not scoring" }
    - { name: merit,    gate: init-006, reason: "dictionary 1st = abstract quality/deserving, not scoring" }
    - { name: rating,   gate: init-006, reason: "dictionary 1st = classification; financial rating collision" }
    - { name: audit,    gate: init-006, reason: "dictionary 1st = financial audit, off-target" }
    - { name: judge,    gate: init-006, reason: "CLI 1st = court judge; binary decision sense" }
    - { name: tier,     gate: init-006, reason: "concept = discrete levels, not continuous gradient scoring" }
    - { name: tally,    gate: init-006, reason: "dictionary OK but non-native 1st unknown ('tally 我不懂'); PROMO fail" }
    - { name: score,    gate: pass }
    - { name: grade,    gate: pass }
    - { name: assess,   gate: pass }
    - { name: weight,   gate: pass }
    - { name: mark,     gate: pass }

  scores:
    - name: score
      score: 8.5
      anchors:
        - "D1: 5 letters"
        - "D2: 3/4 layers (dictionary sports off; CLI/slogan/software on); 4 priors mitigated by context"
        - "D3: slogan 'A framework for AI to score the result' — user's own gold standard"
        - "D5: batch computation ✓ (score = compute score from inputs)"
        - "PROMO: 9.0 — catchy (hook: 'AI 评什么?'), memorable, spreadable, 大家熟悉"
        - "x-cmd brand: noun ✓, lowercase, no separator"
      misses:
        - "D2: dictionary 1st = sports score (off-target), 4 priors — accepted trade-off"

    - name: grade
      score: 8.0
      anchors:
        - "D1: 5 letters"
        - "D2: 4/4 layers (all on); academic grade = single prior"
        - "D3: 'A framework for AI to grade the result' — clear, accessible"
        - "D5: batch ✓ (grade = assign a level)"
        - "PROMO: 8.0 — accessible, 大家熟悉 ✓, no hook"
      misses:
        - "D6: no vivid imagery (academic grade is abstract)"
        - "PROMO: slogan lacks hook (grade is too plain)"

    - name: assess
      score: 7.5
      anchors:
        - "D1: 6 letters"
        - "D2: 4/4 layers (all on); single prior ✓"
        - "D3: 'A framework for AI to assess the result' — professional, clear"
        - "D5: batch ✓ (assess = evaluate)"
        - "PROMO: 7.5 — professional tone, accessible, weak hook"
      misses:
        - "x-cmd brand: verb form (assess is not a noun)"
        - "D6: abstract"

    - name: weight
      score: 7.0
      anchors:
        - "D1: 6 letters"
        - "D2: 3/4 layers (dictionary 'heaviness' off; CLI/slogan/software on)"
        - "D3: 'A framework for AI to weight the result' — clear in stats context"
        - "D5: batch ✓ (apply weights = computation)"
        - "PROMO: 7.0 — stats context clear, 大家熟悉"
      misses:
        - "D2: dictionary 1st = physical heaviness (needs context to read as 'importance factor')"
        - "D6: abstract"

    - name: mark
      score: 7.0
      anchors:
        - "D1: 4 letters"
        - "D2: 3/4 layers (dictionary 'physical impression' off; CLI/slogan/software on)"
        - "D3: 'A framework for AI to mark the result' — clear, simple"
        - "D5: batch ✓"
        - "PROMO: 7.5 — simple, accessible, 大家熟悉, no hook"
      misses:
        - "D2: dictionary 1st = physical stain/impression (needs education context to read as 'mark = score')"

  final:
    pick: score
    backup: grade
