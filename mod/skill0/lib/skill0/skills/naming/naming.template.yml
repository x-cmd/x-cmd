# naming.template.yml
# TEMPLATE for naming.<user-task>.yml — copy this file, rename to
# naming.<your-task>.yml, fill in / crop sections as needed.
#
# Required sections (audited by naming.okr-creator.yml):
#   1. goal-* rule         — what the naming task is
#   2. ≥1 keyresult-* rule — verifiable outcomes
#   3. ≥1 task-* rule      — task-specific constraints (e.g. must-be-X)
#   4. session on goal-*   — audit trail:
#      4a. prefer          — 5 init-004 answers
#      4b. init_verdicts   — per-candidate gate decisions
#      4c. scores          — D1-D7 anchored per-candidate
#      4d. final           — pick + backup
#
# Placeholders use TBD_<name>_<hint> so missing fields are obvious
# to both humans and x rule check (grep TBD_ to find unfilled spots).
#
# Worked example: see naming.trial-run-module.yml.

# ============================================================
# 1. Goal
# ============================================================
# Replace goal-<id> with a meaningful suffix, e.g. goal-my-mod-naming.
# TBD_ describes what to fill in.

goal-TBD_task_id:
  name: TBD_one-line goal — e.g. "Pick standalone module name for <concept>"
  apply: "naming.<user-task>.yml (self)"
  level: error
  desc:
  - "TBD_what the candidate must satisfy: scenario + role + concept anchors."
  - "TBD_which dimensions are core (e.g. TRIAL vs REAL, RUN vs TEST, length)."

# ============================================================
# 2. Key Results (verifiable outcomes)
# ============================================================
# Add as many keyresult-* rules as you have verifiable outcomes.
# Each must be machine-checkable OR human-verifiable with concrete criteria.

keyresult-kr1_TBD_short_label:
  name: TBD_verifiable outcome 1
  apply: "naming.<user-task>.yml"
  level: error
  desc:
  - "TBD_what counts as passing — be concrete, not 'looks good'."

keyresult-kr2_TBD_short_label:
  name: TBD_verifiable outcome 2
  apply: "naming.<user-task>.yml"
  level: error
  desc:
  - "TBD_pass/fail criterion."

# (add more keyresult-* rules as needed)

# ============================================================
# 3. Task-specific rules
# ============================================================
# These are the constraints THIS naming task enforces on candidates.
# Common patterns:
#   - must-be-X-not-Y (concept alignment, e.g. TRIAL not REAL)
#   - length-N-to-M-letters
#   - must-imply-<archetype>
#   - <domain>-specific-acceptable / not-acceptable
# Crop / add as needed.

TBD_task_id-001:
  name: TBD_constraint — e.g. "must-be-TRIAL-not-REAL"
  apply: "candidate words for TBD_task"
  level: error|warn
  desc:
  - "TBD_what the candidate must satisfy."
  - "TBD_which D1-D7 dimension this constrains."

TBD_task_id-002:
  name: TBD_constraint — e.g. "length-5-to-8-letters"
  apply: "candidate words for TBD_task"
  level: error
  desc:
  - "TBD_threshold + reason."

# (add more TBD_task_id-* rules as needed)

# ============================================================
# 4. Session record (audit trail)
# ============================================================
# Stored on the goal rule as `session:`. Audited by naming.okr-creator.yml.
# `session:` is a non-standard field — lint warns (check_090), OKR-creator accepts.

session:
  # 4a. Prefer — answers to the 5 init-004 questions.
  # MUST answer all 5, even if the answer is "no / weak".
  prefer:
    vivid: TBD_yes | no | weak
    domain_acceptable: TBD_list — e.g. [naval] or [] for "no narrow domain OK"
    length_priority: TBD_shorter | self_explanatory
    origin: TBD_english | chinese | coined
    trade_off: TBD_single_prior_ok | hit_every_dim

  # 4b. Init verdicts — per-candidate gate decisions.
  # Record EVERY candidate you considered, with gate + reason.
  # gate ∈ { init-005 (red-line), init-006 (dictionary), init-007 (length), pass }
  init_verdicts:
    - { name: TBD_candidate, gate: TBD_init-005|init-006|init-007|pass, reason: "TBD_why" }
    # (add one entry per candidate considered)

  # 4c. Scores — D1-D7 anchored per candidate.
  # Only candidates that passed init go here. All scores >= 6.0.
  # Each score MUST have anchors: list — no bare numbers.
  scores:
    - name: TBD_candidate
      score: TBD_0_to_10
      anchors:
        - "D1: TBD_letter count"
        - "D2: TBD_dictionary first meaning"
        - "D3: TBD_compound literal"
        - "D4: TBD_trial vs real evidence"
        - "D5: TBD_run vs test evidence"
        - "D6: TBD_vividness evidence"
        - "D7: TBD_large equipment evidence"
      misses:
        - "TBD_what's missing (only list real misses, not always all 7)"
    # (add one entry per passing candidate)

  # 4d. Final — pick + backup.
  # backup can be null if no viable backup exists.
  final:
    pick: TBD_winning_candidate
    backup: TBD_runner_up_or_null

# ============================================================
# Cropping guide for the agent
# ============================================================
#
# This template is a STARTING POINT. Crop / extend as the task requires:
#
#   1. Rename file:       naming.template.yml → naming.<user-task>.yml
#   2. Replace TBD_* IDs: goal-TBD_task_id, keyresult-kr1_TBD_short_label, etc.
#   3. Fill desc/tldr:    every "TBD_..." line with real content
#   4. Adjust task rules: keep what's relevant, drop the rest, add new ones
#   5. Fill session:      all 4 sub-sections (prefer / init_verdicts / scores / final)
#   6. Validate:          x rule check -r <naming-dir> naming.<user-task>.yml
#      OKR-creator checks:  has goal/keyresult/task rules, prefer complete,
#                           init_verdicts non-empty, scores anchored & >= 6.0,
#                           final.pick declared, pick-backup gap <= 1.0
#
# Worked example reference:  naming.trial-run-module.yml
