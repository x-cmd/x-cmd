
ccal-meta-010:
  name: ensure-all-metadata-is-right

  desc:
  - ccal info 应能正常输出指定日期的信息
  - ccal info 的输出应包含输入的日期

  testcase:
    ccal_info_exitcode:
      sh: |
        x ccal info 260501
        x assert exit 0

    ccal_info:
      desc: "ccal info output contains date"
      sh: |
        x ccal info 260603
        x assert stdout grep "260603"
