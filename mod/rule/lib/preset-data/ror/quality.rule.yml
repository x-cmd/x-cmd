
rule-struct-005:
  name: must-pass-lint
  apply: ".rule.yml files"
  level: error
  desc:
  - Every .rule.yml file must pass `x rule lint <file>` with zero errors.
  - lint 是确定性检查（jq），确保 YAML 语法正确、rule ID 格式合法、必填字段存在、level 枚举合法。
  tldr:
  - wrong: "lint reports meta-rule-010 error"
    right: "lint outputs only header row (zero errors)"

  testcase:
    lint_pass:
      sh: |
        x rule lint "$___X_CMD_ROOT_MOD/rule/lib/meta.rule.yml"

    lint_fail_bad_yml:
      sh: |
        d="$(mktemp -d)"
        printf "foo: [unclosed\n" > "$d/bad.rule.yml"
        x rule lint "$d/bad.rule.yml"
        r="$?"
        rm -rf "$d"
        [ "$r" -ne 0 ]

    lint_fail_no_desc:
      sh: |
        d="$(mktemp -d)"
        printf "my-rule:\n  name: test\n" > "$d/nodesc.rule.yml"
        x rule lint "$d/nodesc.rule.yml"
        r="$?"
        rm -rf "$d"
        [ "$r" -ne 0 ]

rule-struct-010:
  name: rule-has-desc
  apply: ".rule.yml files"
  level: error
  desc:
  - Every rule must have a non-empty desc list explaining what it checks.
  - Each desc item should be a specific, actionable criterion.
  tldr:
  - wrong: "desc: []"
    right: "desc:\n- The file must pass x rule lint\n- All rule IDs follow the naming convention"

  testcase:
    has_desc:
      sh: |
        x rule info -r "$___X_CMD_ROOT_MOD/rule/lib" --json meta-rule-010 | grep -q '"desc"'

rule-struct-020:
  name: rule-has-level
  apply: ".rule.yml files"
  level: warn
  desc:
  - Rules should declare a level: error, must, warn, info, or debug.
  - error/must rules block CI; warn/info are advisory.

  testcase:
    has_level:
      sh: |
        x rule info -r "$___X_CMD_ROOT_MOD/rule/lib" --json meta-rule-010 | grep -q '"level"'

rule-struct-030:
  name: rule-has-tldr
  apply: ".rule.yml files"
  level: warn
  desc:
  - Non-trivial rules should include a tldr section with at least one wrong/right pair.
  - tldr helps AI evaluators quickly understand the rule intent.

  testcase:
    has_tldr:
      sh: |
        x rule info -r "$___X_CMD_ROOT_MOD/rule/lib" --json rule-struct-005 | grep -q '"tldr"'

rule-struct-040:
  name: rule-id-format
  apply: ".rule.yml files"
  level: error
  desc:
  - Rule IDs must be alphanumeric with hyphens/underscores, e.g. rule-struct-010 or P06-var-010.
  - Must start with a letter or digit.

  testcase:
    valid_id:
      sh: |
        d="$(mktemp -d)"
        printf "my-valid-id:\n  desc:\n  - test\n" > "$d/test.rule.yml"
        x rule lint "$d/test.rule.yml"
        r="$?"
        rm -rf "$d"
        [ "$r" -eq 0 ]

    invalid_id:
      sh: |
        d="$(mktemp -d)"
        printf "-bad-id:\n  desc:\n  - test\n" > "$d/bad.rule.yml"
        x rule lint "$d/bad.rule.yml"
        r="$?"
        rm -rf "$d"
        [ "$r" -ne 0 ]

rule-struct-050:
  name: rule-file-naming
  apply: ".rule.yml files"
  level: warn
  desc:
  - Rule files must end in .rule.yml to be discovered by x rule commands.
  - Use descriptive filenames matching the category, e.g. var.rule.yml, concept.rule.yml.

  testcase:
    discover_rule_yml:
      sh: |
        x rule test ls -r "$___X_CMD_ROOT_MOD/rule/lib" | grep -q "rule.yml"

rule-struct-060:
  name: rule-test-coverage
  apply: ".rule.yml files"
  level: info
  desc:
  - Rules with testcase sections are preferred. Use test-coverage to indicate how much the testcase proves.
  - If a rule cannot be deterministically tested, that is acceptable (no testcase section needed).

  testcase:
    has_testcase:
      sh: |
        x rule test ls -r "$___X_CMD_ROOT_MOD/rule/lib" | grep -q "ccal-meta-010"
