os-disk-usage:
  name: Disk Usage Check
  apply: "*"
  level: warn
  desc:
  - Check if any mounted filesystem has usage above 90%.
  - Use `df -h` or equivalent to verify all filesystems.
  tldr:
  - wrong: "Filesystem / at 95% capacity"
    right: "All filesystems below 90% usage"

os-memory-pressure:
  name: Memory Pressure Check
  apply: "*"
  level: warn
  desc:
  - Check if system memory usage is above 90% or swap is heavily used.
  - Use `free -h` (Linux) or `vm_stat` (macOS) to verify.
  tldr:
  - wrong: "Memory 95% used, swap 80% used"
    right: "Memory below 90%, swap usage minimal"

os-load-average:
  name: Load Average Check
  apply: "*"
  level: warn
  desc:
  - Check if system load average is significantly higher than CPU core count.
  - Use `uptime` or `top` to verify.
  tldr:
  - wrong: "Load average 16.0 on 4-core system"
    right: "Load average below core count"

os-zombie-processes:
  name: Zombie Processes Check
  apply: "*"
  level: warn
  desc:
  - Check for zombie or defunct processes that may indicate resource leaks.
  - Use `ps aux | grep Z` to find zombie processes.
  tldr:
  - wrong: "50+ zombie processes found"
    right: "No zombie processes or very few"
