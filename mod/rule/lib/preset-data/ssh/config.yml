ssh-root-login:
  name: SSH Root Login
  apply: "sshd_config"
  level: error
  desc:
  - Root login via SSH should be disabled or set to prohibit-password.
  - Check /etc/ssh/sshd_config for PermitRootLogin setting.
  tldr:
  - wrong: "PermitRootLogin yes"
    right: "PermitRootLogin no or prohibit-password"

ssh-password-auth:
  name: SSH Password Authentication
  apply: "sshd_config"
  level: warn
  desc:
  - Password authentication should be disabled in favor of key-based auth.
  - Check PasswordAuthentication in /etc/ssh/sshd_config.
  tldr:
  - wrong: "PasswordAuthentication yes"
    right: "PasswordAuthentication no"

ssh-empty-passwords:
  name: SSH Empty Passwords
  apply: "sshd_config"
  level: error
  desc:
  - Empty passwords must be explicitly prohibited.
  - Check PermitEmptyPasswords in /etc/ssh/sshd_config.
  tldr:
  - wrong: "PermitEmptyPasswords yes"
    right: "PermitEmptyPasswords no"

ssh-port-default:
  name: SSH Default Port
  apply: "sshd_config"
  level: info
  desc:
  - Using the default SSH port (22) is common but changing it reduces automated scan noise.
  - Check Port in /etc/ssh/sshd_config.
  tldr:
  - wrong: "Port 22 (if exposed to internet)"
    right: "Non-standard port or port 22 behind firewall"

ssh-authorized-keys:
  name: SSH Authorized Keys Hygiene
  apply: "*"
  level: warn
  desc:
  - Check ~/.ssh/authorized_keys for overly permissive entries or keys without comments.
  - Ensure authorized_keys files have correct permissions (600).
  tldr:
  - wrong: "authorized_keys with no comment, permissions 644"
    right: "Keys labeled with owner, permissions 600"

ssh-failed-logins:
  name: SSH Failed Login Attempts
  apply: "*"
  level: warn
  desc:
  - Check for excessive failed SSH login attempts in system logs.
  - Use `lastb` or check /var/log/auth.log (Linux) / /var/log/system.log (macOS).
  tldr:
  - wrong: "1000+ failed login attempts in recent logs"
    right: "Few or no failed login attempts"
