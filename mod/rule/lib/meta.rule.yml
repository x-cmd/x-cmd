# meta.rule.yml — rules for validating rule.yml files
# Rule 010 is enforced by `x rule lint` (jq static analysis).
# Rules 020+ require human/LLM judgment and cannot be checked programmatically.

meta-rule-010:
  name: must-pass-lint
  level: error
  desc:
  - The rule.yml file must pass `x rule lint <file>` with zero errors.
  - "lint checks: valid YAML syntax, rule ID format, required desc list, level enum, test-coverage integer, no unknown fields."

meta-rule-020:
  name: desc-meaningful
  level: warn
  desc:
  - Each "desc" item should convey concrete, actionable criteria — not just a vague label.

meta-rule-030:
  name: tldr-covers-typical-case
  level: warn
  desc:
  - If a rule is non-trivial, it should include a "tldr" with at least one wrong/right pair.

meta-rule-040:
  name: test-sufficient-percentage-implies-test
  level: warn
  desc:
  - "test-coverage only makes sense when testcase exists. Default is 100 (testcase fully proves compliance)."
  - "Lower values (e.g. 50) mean testcase only partially proves compliance; the rest requires AI review. 0 is contradictory with having testcase."

meta-rule-050:
  name: testcase-field-structure
  level: warn
  desc:
  - "If present, testcase should be a mapping of named test cases. Each case has an engine-prefixed command (e.g. sh:)."
