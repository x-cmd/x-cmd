# meta.rule.yml — rules for validating rule.yml files
# Rule 010 is enforced by `x rule lint` (jq static analysis).
# Rules 020+ require human/LLM judgment and cannot be checked programmatically.

meta-rule-010:
  name: must-pass-lint
  level: error
  desc:
  - The rule.yml file must pass `x rule lint <file>` with zero errors.
  - "lint checks: valid YAML syntax, rule ID format (alphanumeric + hyphens), required desc list (non-empty), level enum (error/must/warn/info/debug), tldr must be list if present, no unknown fields."

meta-rule-020:
  name: desc-meaningful
  level: warn
  desc:
  - Each "desc" item should convey concrete, actionable criteria — not just a vague label.
  - A good desc tells the checker *what exactly* to look for and *why* it matters.

meta-rule-030:
  name: tldr-covers-typical-case
  level: warn
  desc:
  - If a rule is non-trivial, it should include a "tldr" with at least one wrong/right pair demonstrating the violation and the correct pattern.
  - The wrong/right examples should be realistic code snippets, not abstract descriptions.
