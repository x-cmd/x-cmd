P06-var-010:
  name: avoid-define-variable-like-path-shlvl-logname-home
  apply: all posix shell files
  desc:
  - 千万不要用定义 path, user, home 等这种系统级变量，虽然与 PATH, USER, HOME 并非同大小写，但在 zsh 环境中 ， path 与 PATH 变量等价。
  - 重点避免 path, home, user

  tldr:
  - wrong: local path;
    right: local path_list;

P06-var-020:
  name:
  apply: all posix shell files
  desc:
  - x-cmd 的 shell 函数内变量尽量以小写为主

P06-var-030:
  name:
  apply: all posix shell files
  desc:
  - x-cmd 的 环境变量以 ___X_CMD_<模块名> 开头，以最大限度避免重复
  - 有部分 XT_ 开头的例外，因为用于在 theme 模块自定义主题变量

P06-var-040:
  name:
  apply: all posix shell files
  desc:
  - 变量定义应该以清晰为主，例如如果用户传入的是路径是目录，可以指定为
