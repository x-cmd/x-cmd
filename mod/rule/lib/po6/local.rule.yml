PO6-local-010:
  name: local-only-defined-once
  level: error  # error, warn, info, debug
  desc:
  - 在同一个函数里，local 不应该被两次定义
  - 在同一个函数里，local 不应该出现在 while 等循环里面
  - 重点注意 像 i, j, k, x_ 等常用变量，避免重复采用 local 定义

  tldr:
  - wrong: while [ $i -lt 10 ]; do local i=$((i+1)); do
    right: local i=0; while [ $i -lt 10 ]; do i=$((i+1)); do

  memo:
  - 在 zsh，如果一个变量被第二次 local 定义，将打印出值出来。

P06-local-020:
  name: local-take-one-variable
  level: must
  desc:
  - 在一些 shell ，local 后只能定义一个变量

  tldr:
  - wrong: local a b c
    right: local a; local b; local c;

  memo:
  - 事实上，在常用的 bash, zsh, dash, ash 都能支持，不过为了小心，还是保证 local 只定义一个变量


P06-local-030:
  name: local-init
  level: must
  desc:
  - local 定义变量时可以赋值，但绝对不允许采用子进程插值

  tldr:
  - right: local i=0
    wrong: local i; i=0
  - right:

P06-local-040:
  name: local-must-init
  level: must
  tldr:
  - right: local str=""
    wrong: local str

  memo:
    那是因为在一些 shell ， local 定义时，可能来自环境变量的值并未清空。

P06-local-050:
  name: local-undefined-init
  level: must
  tldr:
  - right: local str=""
    wrong: local str=

