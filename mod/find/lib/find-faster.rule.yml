find-faster-010:
  name: avoid-home-root-start
  apply: "find"
  level: error
  desc:
  - "Prefer narrowing to a project directory over scanning from $HOME(~) or /root — causes massive scans and permission prompts."
  tldr:
  - wrong: 'find ~ -name "*.ts"'
    right: 'find ~/project -name "*.ts"'

find-faster-020:
  name: exclude-unnecessary-heavy-dirs
  apply: "find"
  level: warn
  desc:
  - "EXCLUDE these directories if unnecessary: .git, .svn, .hg, node_modules, __pycache__, .venv, venv, dist, build, out, .cache, .tmp, vendor, .x-cmd.root, .local, .config"
  - "EXCLUDE these directories if unnecessary in macOS HOME folder: Library, Applications"
  - "find does NOT respect .gitignore."
  tldr:
  - wrong: 'find . -name "*.ts"'
    right: 'find . \( -name .git -o -name node_modules \) -prune -o -name "*.ts" -print'

find-faster-030:
  name: prefer-fs-index
  apply: "find"
  level: info
  desc:
  - "Prefer filesystem index tools over raw find when available — no traversal, instant results."
  - "macOS: mdfind (Spotlight index)"
  - "Linux: locate / plocate (updatedb index)"
  - "Cross-platform: fd (respects .gitignore by default)"
  tldr:
  - wrong: 'find / -name "config.yml"'
    right: 'mdfind -name "config.yml"'
