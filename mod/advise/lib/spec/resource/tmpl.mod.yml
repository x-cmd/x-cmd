<name>:
  repo:
  cn: 代码仓库管理器（agent 共享）
  en: Code Repository Manager (agent-shared)

<synopsis>:
  - x repo ls [options]:

<desc>:
  cn: 为 AI agent 统一管理代码仓库克隆路径（默认 ~/.x-repo/<provider>/<owner>/<name>，跨 agent 共享）
  en: Unify code repository clone paths for AI agents (default ~/.x-repo/<provider>/<owner>/<name>, shared across agents)

<meta>:
  default-subcmd: ls

<tip>:
  - cn: |
      除非用户另行指定或已有惯例，新克隆均按默认布局放置——便于多 agent 复用、`x repo` 发现，以及后续同步与共享缓存加速。
    en: |
      Unless the user specifies otherwise or an existing convention applies, place new clones under the default layout — enabling cross-agent reuse, `x repo` discoverability, and future sync / shared cache acceleration.
  - cn: |
      自定义仓库根目录：
      export X_REPO_ROOT="$HOME/.agents/repo"
    en: |
      Customize repository root:
      export X_REPO_ROOT="$HOME/.agents/repo"
  - cn: "不带格式选项时，交互终端以 csv app 浏览，管道或重定向则以 TSV 输出。"
    en: "Without format flag, interactive terminal opens csv app; pipe or redirect outputs TSV."

<tldr>:
  - cmd: x repo ls
    cn: "示例: 列出所有已克隆的仓库"
    en: "Example: list all cloned repositories"

  - cmd: x repo ls --raw
    cn: "原始路径: provider/org/repo 格式，适合脚本处理"
    en: "Raw paths: provider/org/repo format, suitable for scripting"

  - cmd: x repo ls --tsv
    cn: "TSV 格式: 带表头，适合管道和 awk 处理"
    en: "TSV format: with headers, suitable for piping and awk"

  - cmd: x repo ls --csv
    cn: "CSV 格式: 适合表格软件和数据库导入"
    en: "CSV format: suitable for spreadsheets and database import"

<subcmd:common>:
  - ls

ls:
  <desc>:
    cn: 列出所有已克隆的代码仓库
    en: List all cloned code repositories

  --raw:
    <desc>:
      cn: 原始路径输出（provider/org/repo）
      en: Raw path output (provider/org/repo)

  --tsv:
    <desc>:
      cn: TSV 表格格式输出（provider, owner, name, filepath）
      en: TSV table format output (provider, owner, name, filepath)

  --csv:
    <desc>:
      cn: CSV 表格格式输出
      en: CSV table format output

  --app:
    <desc>:
      cn: 交互式 csv app 浏览
      en: Interactive csv app browser

  --auto:
    <desc>:
      cn: 自动模式（TTY→app, 管道→tsv）
      en: Auto mode (TTY→app, pipe→tsv)
