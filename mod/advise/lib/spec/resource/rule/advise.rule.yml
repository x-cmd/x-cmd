# Advise Spec 规则集
# 用于 x check / x rule 检查 adv/index.yml 的编写质量
# 命名规范: ADV-<类别><序号>
#
# 配套文档（同目录，互为参考，同时更新）：
#   spec.md              — advise 编写规范：字段定义、编写原则、示例、错误模式
#   rule/advise.rule.yml — 本文件，检查规则集
# 修改 spec.md 中的原则时同步更新本文件，反之亦然。

# ============================================================
# Section: 行文组织原则（所有规则的底层共识）
# ============================================================

# advise 的主要服务对象是 人类专家 + AI agent（codex、openclaw 等）。
# 行文追求：精炼且信息量大。砍无效词，保留有区分度的信息。
#
# 人类新手是次要考虑。通过"逐步深入"的排列梯度降低门槛：
#   第一个 tldr/tip — 最简单、最直觉的用法
#   中间            — 核心场景，信息密度高
#   后面            — 进阶场景、边界情况、脚本集成
# 不是每条都要"从零解释"，而是整体排列上有梯度。
#
# 当专家信息密度需求与新手友好冲突时，优先信息密度。
# 人类新手可以通过 agent 辅助理解，所以信息密度不会真正排斥新手。

# ============================================================
# Section: 语法与结构
# ============================================================

ADV-syntax-010:
  name: yaml-valid
  apply: adv/index.yml
  level: error
  desc:
  - YAML 必须语法合法，能通过 `x y2j adv/index.yml` 解析无报错
  - 常见错误：冒号未加引号、Tab 缩进、特殊字符（! & *）未转义

  tldr:
  - wrong: en: Backend: faster-whisper, openai-api
    right: en: "Backend: faster-whisper, openai-api"

ADV-syntax-020:
  name: no-tab-indent
  apply: adv/index.yml
  level: error
  desc:
  - 必须使用空格缩进，禁止 Tab 字符

ADV-syntax-030:
  name: quote-values-with-colon
  apply: adv/index.yml
  level: error
  desc:
  - 值中包含冒号 `:` 时必须用引号包裹，否则 YAML 解析错误
  - 这是最常见的 YAML 编写错误

  tldr:
  - wrong: cn: 示例: 查看主机信息
    right: cn: "示例: 查看主机信息"

ADV-syntax-040:
  name: subcmd-defined-at-root-level
  apply: adv/index.yml
  level: error
  desc:
  - 子命令必须直接在根级别定义，不使用 `<subcmd>:` 包裹
  - `<subcmd:Category>:` 仅用于 help 显示分类，不定义子命令本身

  tldr:
  - wrong: |
      <subcmd>:
        cat:
          <desc>: ...
    right: |
      cat:
        <desc>: ...

# ============================================================
# Section: 必需字段
# ============================================================

ADV-field-010:
  name: required-fields-present
  apply: adv/index.yml
  level: error
  desc:
  - 模块级别必须包含以下字段：<name>、<synopsis>、<desc>、<tldr>
  - <name> 必须包含 module_name（无 cn/en 后缀）、cn、en
  - <desc> 必须包含 cn 和 en
  - <synopsis> 至少有一个用法示例
  - <tldr> 至少 3 个示例（简单模块）或 8+（复杂模块）

ADV-field-020:
  name: tldr-has-cmd-cn-en
  apply: adv/index.yml
  level: error
  desc:
  - 每个 tldr 条目必须包含 cmd、cn、en 三个字段
  - 缺少任何一个都会导致 help 输出异常

  tldr:
  - wrong: |
      - cmd: x host get localhost
        cn: "查询 IP"
    right: |
      - cmd: x host get localhost
        cn: "查询 IP"
        en: "Lookup IP"

ADV-field-030:
  name: subcmd-desc-has-cn-en
  apply: adv/index.yml
  level: warn
  desc:
  - 每个子命令的 <desc> 应包含 cn 和 en 两种语言描述
  - 每个选项的 <desc> 应包含 cn 和 en

ADV-field-040:
  name: synopsis-only-at-module-level
  apply: adv/index.yml
  level: error
  desc:
  - <synopsis> 只能在模块级别定义，不能出现在子命令或选项级别
  - 子命令的参数说明应使用 <1>、<2>、<n> 等位置参数字段

  tldr:
  - wrong: |
      get:
        <synopsis>: <hostname>
        <desc>: ...
    right: |
      get:
        <desc>: ...
        <1>:
          <desc>: 主机名

# ============================================================
# Section: 选项前置
# ============================================================

ADV-option-010:
  name: options-before-args-in-tldr
  apply: adv/index.yml
  level: error
  desc:
  - TLDR 中的命令示例，选项必须放在参数之前
  - 代码可能支持选项后置，但文档中绝对不要鼓励这种写法
  - 这是 x-cmd 的设计规范

  tldr:
  - wrong: x ccal info 2026-05-09 --yml
    right: x ccal info --yml 2026-05-09

ADV-option-020:
  name: options-before-args-in-synopsis
  apply: adv/index.yml
  level: error
  desc:
  - <synopsis> 中的命令示例，选项必须放在参数之前

  tldr:
  - wrong: x <module> <args> --<option>
    right: x <module> --<option> <args>

ADV-option-030:
  name: use-long-help-not-short-h
  apply: adv/index.yml
  level: warn
  desc:
  - 在 tldr、tip、desc 等所有文档中，引用帮助信息时使用 `--help` 而非 `-h`
  - 前提是命令确实提供 `--help`

  tldr:
  - wrong: "详情参见 x mod -h"
    right: "详情参见 x mod --help"

# ============================================================
# Section: TLDR 场景化原则
# ============================================================

ADV-tldr-010:
  name: first-tldr-simplest
  apply: adv/index.yml
  level: warn
  desc:
  - 第一个 tldr 应面向最常用、最有吸引力的场景，尽量简单
  - 不带多余的选项，用最自然的调用方式
  - 让人一看就知道"这个模块是做什么的"，一用即有结果

  tldr:
  - wrong: |
      - cmd: x dbnomics align --csv imf.us.cpi imf.de.cpi
        cn: "CSV 格式: 对比美/德 CPI"
    right: |
      - cmd: x dbnomics align imf.us.cpi imf.de.cpi imf.jp.cpi
        cn: "对比美/德/日 CPI"

ADV-tldr-020:
  name: scenario-over-capability-showcase
  apply: adv/index.yml
  level: warn
  desc:
  - 每个 tldr 面向一个具体场景，不是为了展示参数组合
  - "展示最强能力"是次要原则，当与场景适用冲突时让位
  - 优先把功能和场景用法讲清楚，再考虑精简篇幅

ADV-tldr-030:
  name: no-repeat-within-same-scope
  apply: adv/index.yml
  level: info
  desc:
  - |
      **同一 scope 内避免重复，不同 scope 之间允许重叠**：
      - 同一个 subcmd 的 tldr 中，避免"同样的事情说两次"——例如不要用 `--csv` 展示两个相似场景，其中一个去掉 `--csv` 即可
      - 但**父层（根级）和子层（subcmd）的 tldr 允许有类似的条目**，因为用户开始读 tldr 的位置各不一样
      - 父层需要对子 subcmd 的常用功能和热门功能做清晰的推广描述，所以父层 tldr 中出现与某子命令 tldr 相似的条目是正常的、预期的
      - 格式选项（如 --csv/--tsv/--json）在同一 scope 内各出现一次即可，除非某场景确实需要特定格式
  tldr:
  - wrong: |
      # 同一 stress subcmd 下，两个 --csv 的 tldr 场景雷同
      stress:
        <tldr>:
          - cmd: x time stress --csv echo hello
          - cmd: x time stress --csv printf hello
    right: |
      # 第二条换用不同格式或去掉格式选项
      stress:
        <tldr>:
          - cmd: x time stress --csv echo hello
          - cmd: x time stress --tsv printf hello
      # 或者
      stress:
        <tldr>:
          - cmd: x time stress --csv echo hello
          - cmd: x time stress printf hello

ADV-tldr-040:
  name: format-option-explains-scenario
  apply: adv/index.yml
  level: warn
  desc:
  - 带 --csv/--tsv/--json 格式选项的 tldr，描述中应说明该格式适合什么场景
  - 不要只写"CSV 格式: xxx"，应写明用途

  tldr:
  - wrong: cn: "CSV 格式: 对比美/中 GDP"
    right: cn: "CSV 格式: 对比美/中 GDP，适合数据库导入、表格软件或脚本处理"

ADV-tldr-050:
  name: desc-prefix-convention
  apply: adv/index.yml
  level: info
  desc:
  - tldr 描述前缀应与模块类型匹配
  - 功能模块用 "示例:" / "Example:"
  - 测试模块用 "测试:" / "Test:"
  - 危险操作用 "警告:" / "Warning:"

ADV-tldr-060:
  name: subcmd-tldr-allowed-and-encouraged
  apply: adv/index.yml
  level: warn
  desc:
  - 普通模块（非效率模块）的子命令下**鼓励**放置 `<tldr>`，聚焦该子命令的独特用法
  - 子命令级 tldr 可以与根级 tldr 有部分重叠，这是正常且被允许的
  - 不应为了"精简"而删除子命令级 tldr，除非该子命令确实没有独立的示例价值
  - 根级 tldr 面向整体认知，子命令级 tldr 面向该子命令的深入用法，两者互补

ADV-tldr-070:
  name: tldr-human-readable-not-man-style
  apply: adv/index.yml
  level: info
  desc:
  - tldr 的描述要说人话，不要写成 man page 风格的参数说明
  - 描述应该让人一眼看出"这个命令在什么场景下用、有什么效果"
  - 好的 tldr 描述就像你在跟同事说"你试一下这个命令，它能干嘛"
  - |
      信息量优先于精炼，但要砍掉无效词。
      无效词 = 删掉不影响理解的词，如"格式输出"中的"格式"、"执行时间"中的"时间"（上下文已暗示）。
      保留的 = 有区分度的词，如"带表头"、"无表头"、"适合管道处理"。
  - |
      对比：
      - 冗余："无表头 TSV 格式输出，适合程序解析和管道处理" → "无效词太多"
      - 精炼："无表头 TSV，适合管道处理" → "信息量不减，砍掉'格式输出'、'程序解析和'"
      - 过短："无表头 TSV" → "丢了适用场景"
  tldr:
  - wrong: "无表头 TSV 格式输出，适合程序解析和管道处理"
    right: "无表头 TSV，适合管道处理"

# ============================================================
# Section: Tip 原则
# ============================================================

ADV-tip-010:
  name: tip-one-point-per-item
  apply: adv/index.yml
  level: warn
  desc:
  - tip 是列表格式，每项只讲一个要点
  - 不要把多个不相关的事项塞进同一条 tip

ADV-tip-015:
  name: tip-scenario-based-writing
  apply: adv/index.yml
  level: warn
  desc:
  - |
      tip 应该**场景化**：描述一个具体的应用场景，然后给出对应的解决方案。
      不要写成 man page 风格的"选项说明"或"功能列表"。
  - 说人话，但要精炼。想象你在跟一个同事口头解释怎么用这个工具。
  - 可以用问句开头引出场景（如"写脚本自动装软件？"），但不是必须的。
  - |
      **能具体就具体**：提到具体产品名而非抽象概念。
      写"codex 或 openclaw 帮用户装软件"而非"让 AI Agent 帮用户装软件"；
      写"GitHub Actions"而非"CI/CD 平台"。
  - |
      **好 tip 的结构**：场景 → 方案（带具体命令）
  tldr:
  - wrong: |
      # man 风格 — 列举选项，没有场景
      - cn: "支持 --best、--withtool、--sys 三种安装模式，可用 --printcmd 预览命令"
    right: |
      # 场景化 — 先说在什么情况下用，再说怎么用
      - cn: "写脚本自动装软件：用 --best 按优先级自动选最佳方法，或 --withtool 指定包管理器。想先看看会执行什么？加 --printcmd 预览再执行"
  - wrong: |
      # 抽象 — "AI Agent" 是模糊概念
      - cn: "让 AI Agent 帮用户找软件：--search 从多个来源聚合搜索"
    right: |
      # 具体 — 提到实际产品名
      - cn: "codex 或 openclaw 帮用户找软件：--search 从多个来源聚合搜索"

ADV-tip-020:
  name: keep-desc-lean-move-detail-to-tip
  apply: adv/index.yml
  level: warn
  desc:
  - 详细的说明应该拆到 tip 中，而不是堆在 desc 里
  - desc 应简短概括模块/子命令的功能定位
  - |
      **注意 desc 的底线**：
      - desc 可以简短，但必须包含**功能定位**和**核心特征**
      - 对于有复杂行为的子命令，desc 保留 2-3 行是合理的（用 `|` 多行格式）
      - 不要为了"精简"把多行 desc 砍成一句话，丢失关键信息
      - 正确做法：把实现细节、边界情况移到 tip；功能概述和核心特征留在 desc
  tldr:
  - wrong: |
      desc 仅写"多次运行命令并输出统计"，丢失了自动校准和 batch10 特征
    right: |
      desc 保留 "多次运行命令并输出完整统计。自动校准消除 shell 计时开销，batch10 模式优化微秒级命令的测量精度。"
      把校准细节、默认行为等移到 tip

# ============================================================
# Section: 修改规则
# ============================================================

ADV-modify-010:
  name: preserve-subcmd-order
  apply: adv/index.yml
  level: error
  desc:
  - 修改 advise 时，必须保持原作者的 subcmd 名称和别名顺序
  - 改变顺序会破坏向后兼容性和用户习惯

  tldr:
  - wrong: c|copy|cp|--cp|-c
    right: c|cp|copy|--cp|-c

ADV-modify-020:
  name: no-delete-or-rename-subcmd
  apply: adv/index.yml
  level: error
  desc:
  - 不得擅自删除或重命名已有的子命令
  - 可以添加新子命令，但旧的必须保留

# ============================================================
# Section: 效率模块
# ============================================================

ADV-efficiency-010:
  name: efficiency-module-only-when-explicitly-marked
  apply: adv/index.yml
  level: error
  desc:
  - 效率模块的判定**完全依赖显式标记** `<meta>: <subcmd-help>: disable`
  - lint/scan 等检查工具**不应主动推断或认定**某个模块为效率模块
  - 没有 `<subcmd-help>: disable` 标记 → 一律视为普通模块，不触发任何效率模块规则
  - 已确认的效率模块仅有：assert、is、str（仅供参考，检查工具不应硬编码此列表来反向推断）
  - 判定标准：子函数的主体执行时间小于参数判断开销（如解析 -h、显示 help）
  - |
      反向验证：标记前必须确认子命令代码中**没有** `case -h|--help` 处理。
      如果子命令的 lib/ 代码中有 `-h|--help) ___x_cmd help` 这样的 case 分支，
      说明该子命令支持 help，不可能是效率模块。AI 不得对此类模块标记 `<subcmd-help>: disable`。

ADV-efficiency-012:
  name: suggest-efficiency-candidate
  apply: adv/index.yml
  level: info
  desc:
  - 检查工具可以**建议**某些 subcmd 适合标记为效率函数，但仅作为 info 级别的提示
  - 未经作者许可，检查工具不得自动将 subcmd 变为效率 subcmd
  - 这是一条**建议性规则**，不会导致 lint 失败
  - |
      **严禁 AI 自作主张标记效率模块**：
      - AI 看到 info 级别建议时，只能向作者报告，不能自行添加 `<subcmd-help>: disable`
      - 已确认的效率模块（assert/is/str）不需要重新标记
      - 任何新的效率模块标记必须由人类作者明确要求

ADV-efficiency-015:
  name: efficiency-subcmd-inherits-from-parent
  apply: adv/index.yml
  level: warn
  desc:
  - 一个子命令仅当其上层（父层或祖层，即模块根级别）**显式标记了** `<meta>: <subcmd-help>: disable` 时，才算效率函数
  - 效率函数的判定是自上而下继承的，不是按单个子命令独立判定
  - 如果模块层没有标记，即使某个子命令执行很快，它也不算效率函数，应作为普通子命令处理
  - 检查工具不得主动扫描并推断"这个模块看起来像效率模块"

ADV-efficiency-020:
  name: efficiency-tldr-at-root-only
  apply: adv/index.yml
  level: error
  desc:
  - 效率模块的所有 TLDR 必须在根级别
  - 效率模块的子命令下禁止出现 <tldr>
  - |
      **注意**：此规则仅对已确认的效率模块生效（assert/is/str）。
      如果模块的子命令代码中有 `case -h|--help)` 处理，说明该子命令支持 help，
      不应被标记为效率模块，此规则不适用。遇到此类情况应先检查 `<subcmd-help>: disable>`
      标记是否正确，而非直接删除子命令级 tldr。

  tldr:
  - wrong: |
      is-int:
        <tldr>:
        - cmd: ...
    right: |
      <tldr>:
      - cmd: x assert is-int 1 2 3
        cn: "测试: 批量验证"
      is-int:
        <desc>:
          cn: 验证整数

ADV-subcmd-010:
  name: underscore-suffix-no-advice-declaration
  apply: adv/index.yml
  level: warn
  desc:
  - 以 `_` 结尾的子命令（如 `join_`、`split_`、`v4_`）是内部脚本变体，不需要在 advise 中声明为 subcmd
  - `_` 变体不需要补全支持，其对应的无 `_` 版本已在 subcmd 定义中
  - `_` 变体的存在只需在模块级别的 `<tip>` 中统一提及即可
  - 不要在 subcmd 分类列表（如 `<subcmd:xxx>`）中列出 `_` 后缀的子命令

ADV-subcmd-020:
  name: no-help-subcmd-in-advice
  apply: adv/index.yml
  level: error
  desc:
  - `-h|--help` 是 x-cmd 各模块/函数的**默认内置子命令**，不需要在 advise 中做任何声明
  - 不要将 `-h|--help` 声明为子命令、列入子命令分类（`<subcmd:xxx>`）、或在 tldr/tip/desc 中提及
  - 正因为默认，所以不需要在 advise 和 help 文档中提及

  tldr:
  - wrong: |
      # 不要在 advise 中定义 -h|--help
      cat:
        <desc>: Display content
        -h|--help:
          <desc>: Show help
    right: |
      # -h|--help 由框架自动处理，advise 不需要定义
      cat:
        <desc>: Display content

# ============================================================
# Section: 写作优先级
# ============================================================

ADV-writing-010:
  name: clarity-over-brevity
  apply: adv/index.yml
  level: warn
  desc:
  - 先把功能和场景用法讲清楚，再考虑精简篇幅
  - 清晰度永远优先于简洁性
  - 宁可多写两句把场景交代完整，不要为了短而丢信息
  - |
      **目标读者优先级**：
      1. 人类专家 + agent（codex、openclaw）— 主要读者，追求精炼且信息量大
      2. 人类新手 — 次要考虑，通过逐步深入（前面的 tldr 简单，后面的进阶）降低门槛
      当两者冲突时，优先服务专家和 agent 的信息密度需求
  - |
      **逐步深入的结构**：
      - 第一个 tldr/tip：最简单、最直觉的用法（新手也能理解）
      - 中间：核心场景，信息密度高（专家直接用）
      - 后面：进阶场景、边界情况、脚本集成（agent 组合使用时参考）
      不是每条都要"从零解释"，而是整体排列上有梯度

ADV-writing-020:
  name: cn-desc-uses-chinese-terminology
  apply: adv/index.yml
  level: info
  desc:
  - 中文描述应使用标准中文术语，而非保留英文原名
  - 例如：Phillips Curve → 菲利普斯曲线，Beveridge Curve → 贝弗里奇曲线
